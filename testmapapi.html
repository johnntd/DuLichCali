<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Google Maps API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f0f0f0;
    }
    #map {
      height: 400px;
      width: 100%;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }
    #autocomplete {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
    }
    #distance-result {
      margin-top: 20px;
      font-size: 16px;
    }
    #error {
      color: red;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Test Google Maps API</h1>
  <p>This page tests your Google Maps API key for Maps, Places, and Distance Matrix APIs.</p>
  <h2>1. Map Display</h2>
  <div id="map"></div>
  <h2>2. Places Autocomplete</h2>
  <input type="text" id="autocomplete" placeholder="Enter an address (e.g., 123 Main St, Santa Ana, CA)">
  <h2>3. Distance Matrix</h2>
  <p>Calculating distance between Santa Ana, CA and Disneyland, CA...</p>
  <div id="distance-result"></div>
  <div id="error"></div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhuG4Bg-PBtG2JdnrZYj6ZLb2HXG1RNF4&libraries=places"></script>
  <script>
    // Initialize Map
    function initMap() {
      try {
        const map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 33.8121, lng: -117.9190 }, // Santa Ana, CA
          zoom: 12
        });
        console.log('Map initialized successfully');
      } catch (err) {
        showError('Map initialization failed: ' + err.message);
      }
    }

    // Initialize Autocomplete
    function initAutocomplete() {
      try {
        const input = document.getElementById('autocomplete');
        const autocomplete = new google.maps.places.Autocomplete(input, {
          types: ['address']
        });
        autocomplete.addListener('place_changed', () => {
          const place = autocomplete.getPlace();
          if (place && place.formatted_address) {
            console.log('Selected place:', place.formatted_address);
            alert('Selected: ' + place.formatted_address);
          } else {
            showError('No valid place selected');
          }
        });
        console.log('Autocomplete initialized successfully');
      } catch (err) {
        showError('Autocomplete initialization failed: ' + err.message);
      }
    }

    // Test Route Matrix (replaces deprecated DistanceMatrixService)
    async function testRouteMatrix() {
      try {
        const lib = await google.maps.importLibrary('routes');
        const RouteMatrix = (lib && lib.RouteMatrix)
                         || (google.maps.routes && google.maps.routes.RouteMatrix);
        if (!RouteMatrix) { showError('RouteMatrix not available in this Maps build'); return; }
        const travelMode = (lib.TravelMode && lib.TravelMode.DRIVE) ? lib.TravelMode.DRIVE : 'DRIVE';
        const resp = await RouteMatrix.computeRouteMatrix({
          origins:      ['Santa Ana, CA'],
          destinations: ['Disneyland, Anaheim, CA'],
          travelMode,
          fields: ['distanceMeters', 'travelDuration', 'staticDuration', 'condition', 'originIndex', 'destinationIndex'],
        });
        if (!resp || !resp.length || !resp[0].distanceMeters) { showError('Route Matrix: no route returned'); return; }
        const el       = resp[0];
        const miles    = (el.distanceMeters / 1609.34).toFixed(1);
        const durSec   = typeof el.duration === 'number' ? el.duration
                       : (el.duration && 'seconds' in el.duration) ? Number(el.duration.seconds)
                       : parseInt(String(el.duration)) || 0;
        const durMins  = Math.round(durSec / 60);
        document.getElementById('distance-result').innerHTML =
          `Distance: ${miles} mi &nbsp;|&nbsp; Duration: ${durMins} min`;
        console.log('Route Matrix success:', miles, 'mi,', durMins, 'min');
      } catch (err) {
        showError('Route Matrix failed: ' + err.message);
      }
    }

    // Show Error Message
    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.style.display = 'block';
      errorDiv.innerHTML += `<p>${message}</p>`;
      console.error(message);
    }

    // Initialize on Load
    window.addEventListener('load', () => {
      if (window.google && window.google.maps) {
        initMap();
        initAutocomplete();
        testRouteMatrix();
      } else {
        showError('Google Maps API failed to load. Check API key or network.');
      }
    });
  </script>
</body>
</html>
