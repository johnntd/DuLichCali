<script>
  document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);
    var vendorId = params.get('id');

    if (vendorId) {
      // ── Vendor detail mode ─────────────────────────────────────────────────────
      // A specific vendor is requested. Init immediately — no region detection
      // needed or wanted. DLCRegion callbacks must NEVER re-run init on a vendor
      // detail page (they would call refreshGrid which is harmless, but region
      // detection async callbacks arriving after Firestore loads could interfere).
      Marketplace.init('hair');
    } else {
      // ── Directory mode ─────────────────────────────────────────────────────────
      // No vendor specified — show category listing, filtered by user's region.
      var _inited = false;
      function _onRegion(region) {
        try { sessionStorage.setItem('dlc_region', region.id); } catch (_) {}
        if (!_inited) { _inited = true; Marketplace.init('hair'); }
        else { Marketplace.refreshGrid(); }
      }
      if (window.DLCRegion) { DLCRegion.init(_onRegion); }
      else { Marketplace.init('hair'); }
    }
  });
</script>
