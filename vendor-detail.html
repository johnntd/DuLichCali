  <div id="mpApp" class="mp-app"></div>

  <script src="/ai-engine.js?v=20260420m"></script>

  <script>
  document.addEventListener('DOMContentLoaded', function () {

    var params = new URLSearchParams(window.location.search);
    var id     = params.get('id');

    if (!id) {
      document.getElementById('mpApp').innerHTML =
        '<div style="padding:3rem;text-align:center;color:var(--muted)">' +
          '<p>No vendor ID specified.</p>' +
          '<a href="/" style="color:var(--sky-lt)">← Home</a>' +
        '</div>';
      return;
    }

    // Show loading state immediately
    document.getElementById('mpApp').innerHTML =
      '<div class="mp-fv-loading">' +
        '<div class="mp-fv-spinner"></div>' +
        '<p style="color:var(--muted)">Loading vendor...</p>' +
      '</div>';

    // Fetch vendor — tries static array first, then Firestore
    VendorDataService.fetchVendor(id).then(function (biz) {
      if (!biz) {
        document.getElementById('mpApp').innerHTML =
          '<div style="padding:3rem;text-align:center;color:var(--muted)">' +
            '<div style="font-size:3rem;margin-bottom:1rem">🔍</div>' +
            '<p>Vendor not found.</p>' +
            '<a href="/" style="color:var(--sky-lt)">← Home</a>' +
          '</div>';
        return;
      }

      // Replace the URL so that window.location.pathname inside
      // marketplace.js detail renderers resolves to the correct
      // category directory (e.g. /nailsalon/), making the back
      // button navigate to the right listing page.
      var categoryPath = VendorDataService.categoryPath(biz.category);
      history.replaceState(null, document.title, categoryPath + '?id=' + encodeURIComponent(id));

      // Update page title with vendor name
      document.title = biz.name + ' · Du Lịch Cali';

      // Initialise marketplace renderer — _container is set inside init()
      Marketplace.init(biz.category);
    });

  });
  </script>
