<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d2f50">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,300;6..96,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css?v=20260421b">
  <link rel="stylesheet" href="/desktop.css">
  <link rel="stylesheet" href="/mobile-barber/mobile-barber.css?v=20260525ai">
</head>
<body class="mb-page">
  <main class="mb-shell" id="mobileBarberApp">
    <div class="mb-language" id="mbLanguage" aria-label="">
      <button class="mb-language__button" type="button" data-lang="en">EN</button>
      <button class="mb-language__button" type="button" data-lang="vi">VI</button>
      <button class="mb-language__button" type="button" data-lang="es">ES</button>
    </div>

    <section class="mb-hero" aria-labelledby="mbHeroTitle">
      <div class="mb-hero__media" aria-hidden="true">
        <div class="mb-hero__photo mb-hero__photo--a" data-hero-slide="0"></div>
        <div class="mb-hero__photo mb-hero__photo--b" data-hero-slide="1"></div>
        <div class="mb-hero__glass">
          <span class="mb-hero__status" data-i18n="heroStatus"></span>
          <strong data-i18n="heroCardTitle"></strong>
          <span data-i18n="heroCardSub"></span>
        </div>
      </div>
      <div class="mb-hero__body">
        <p class="mb-kicker" data-i18n="heroKicker"></p>
        <h1 class="mb-hero__title" id="mbHeroTitle" data-i18n="heroTitle"></h1>
        <p class="mb-hero__copy" data-i18n="heroCopy"></p>
        <div class="mb-hero__actions" aria-label="">
          <a class="mb-button mb-button--primary" href="#mbServices" data-i18n="bookNow"></a>
          <button class="mb-button mb-button--ghost" type="button" data-action="chat" data-i18n="chatAssistant"></button>
          <button class="mb-icon-button" type="button" data-action="voice" aria-label="">
            <span class="mb-icon-button__icon" aria-hidden="true">☎</span>
            <span data-i18n="talkAssistant"></span>
          </button>
        </div>
        <ul class="mb-hero__trust-chips" aria-label="Trust signals">
          <li class="mb-trust-chip" data-i18n="trustChipLicensed"></li>
          <li class="mb-trust-chip" data-i18n="trustChipHouseCall"></li>
          <li class="mb-trust-chip" data-i18n="trustChipVerified"></li>
          <li class="mb-trust-chip" data-i18n="trustChipTravel"></li>
          <li class="mb-trust-chip" data-i18n="trustChipFamily"></li>
        </ul>
        <section class="mb-assistant" id="mbLocationGate" aria-labelledby="mbLocationGateTitle">
          <div>
            <p class="mb-kicker" data-i18n="locationGateKicker"></p>
            <h2 id="mbLocationGateTitle" data-i18n="locationGateTitle"></h2>
            <p id="mbLocationGateCopy" data-i18n="locationGateCopy"></p>
          </div>
          <form id="mbLocationGateForm" novalidate>
            <label class="mb-field">
              <span data-i18n="cityLabel"></span>
              <input id="mbLocationCity" type="text" autocomplete="address-level2" required>
            </label>
            <label class="mb-field">
              <span data-i18n="zipLabel"></span>
              <input id="mbLocationZip" type="text" inputmode="numeric" autocomplete="postal-code">
            </label>
            <div class="mb-form-actions">
              <button class="mb-button mb-button--primary" type="submit" data-i18n="findMyBarber"></button>
              <button class="mb-button mb-button--ghost" type="button" data-action="changeLocation" data-i18n="changeLocation" hidden></button>
            </div>
          </form>
          <form id="mbWaitlistForm" hidden novalidate>
            <p class="mb-inline-notice" id="mbWaitlistCopy"></p>
            <label class="mb-field">
              <span data-i18n="emailLabel"></span>
              <input id="mbWaitlistEmail" type="email" autocomplete="email" required>
            </label>
            <div class="mb-form-actions">
              <button class="mb-button mb-button--primary" type="submit" data-i18n="notifyMe"></button>
            </div>
          </form>
          <p class="mb-inline-notice" id="mbLocationGateStatus" aria-live="polite"></p>
        </section>
      </div>
    </section>

    <section class="mb-trust" aria-label="">
      <article>
        <span aria-hidden="true">⌂</span>
        <strong data-i18n="trustHomeTitle"></strong>
        <p data-i18n="trustHomeCopy"></p>
      </article>
      <article>
        <span aria-hidden="true">✓</span>
        <strong data-i18n="trustVerifiedTitle"></strong>
        <p data-i18n="trustVerifiedCopy"></p>
      </article>
      <article>
        <span aria-hidden="true">$</span>
        <strong data-i18n="trustPricingTitle"></strong>
        <p data-i18n="trustPricingCopy"></p>
      </article>
      <article>
        <span aria-hidden="true">↗</span>
        <strong data-i18n="trustConfirmTitle"></strong>
        <p data-i18n="trustConfirmCopy"></p>
      </article>
    </section>

    <section class="mb-section mb-promo" aria-labelledby="mbPromoTitle">
      <div class="mb-promo__copy">
        <p class="mb-kicker" data-i18n="promoKicker"></p>
        <h2 id="mbPromoTitle" data-i18n="promoTitle"></h2>
        <p data-i18n="promoCopy"></p>
      </div>
      <div class="mb-promo__preview" id="mbPromoPreview" aria-live="polite"></div>
      <a class="mb-button mb-button--primary mb-promo__cta" href="#mbServices" data-i18n="promoCta"></a>
    </section>

    <section class="mb-section mb-before-after" aria-labelledby="mbBeforeAfterTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="beforeAfterKicker"></p>
        <h2 id="mbBeforeAfterTitle" data-i18n="beforeAfterTitle"></h2>
        <p data-i18n="beforeAfterCopy"></p>
      </div>
      <div class="mb-ai-sample-banner" data-i18n="aiPreviewDisclosure"></div>
      <div class="mb-portfolio-grid mb-before-after__grid" id="mbBeforeAfterGallery"></div>
    </section>

    <section class="mb-section mb-convenience" aria-labelledby="mbConvenienceTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="convenienceKicker"></p>
        <h2 id="mbConvenienceTitle" data-i18n="convenienceTitle"></h2>
      </div>
      <div class="mb-convenience-grid" id="mbConvenienceList"></div>
    </section>

    <section class="mb-section mb-promo-clips" aria-labelledby="mbPromoClipsTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="promoClipsKicker"></p>
        <h2 id="mbPromoClipsTitle" data-i18n="promoClipsTitle"></h2>
        <p data-i18n="promoClipsCopy"></p>
      </div>
      <div class="mb-promo-clips__track" id="mbPromoClips"></div>
    </section>

    <section class="mb-section" id="mbServices" aria-labelledby="mbServicesTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="servicesKicker"></p>
        <h2 id="mbServicesTitle" data-i18n="servicesTitle"></h2>
      </div>
      <div class="mb-card-grid mb-service-selector" id="mbServiceList" aria-live="polite"></div>
      <div class="mb-service-progress" id="mbServiceProgress" aria-hidden="true"></div>
      <div class="mb-service-selection" id="mbServiceSelection" hidden></div>
    </section>

    <section class="mb-section" aria-labelledby="mbVendorsTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="vendorsKicker"></p>
        <h2 id="mbVendorsTitle" data-i18n="vendorsTitle"></h2>
      </div>
      <div class="mb-vendor-grid" id="mbVendorList"></div>
      <div class="mb-empty" id="mbEmptyState" hidden>
        <strong data-i18n="emptyTitle"></strong>
        <p data-i18n="emptyCopy"></p>
        <a class="mb-button mb-button--primary" href="/" data-i18n="emptyCta"></a>
      </div>
    </section>

    <section class="mb-assistant" id="mbAssistantPanel" hidden aria-live="polite">
      <div>
        <p class="mb-kicker" data-i18n="assistantKicker"></p>
        <h2 data-i18n="assistantTitle"></h2>
        <p data-i18n="assistantCopy"></p>
      </div>
      <button class="mb-button mb-button--primary" type="button" data-action="closeAssistant" data-i18n="assistantClose"></button>
    </section>
  </main>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCo1FzDthSCXINRHlyJkqdcVKq_inM71SQ&libraries=places&loading=async"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

  <script src="/ai-engine.js?v=20260524a"></script>
  <script src="/nailsalon/phone-intake.js?v=20260427d"></script>
  <script src="/mobile-barber/mobile-barber-data.js?v=20260525g"></script>
  <script src="/mobile-barber/mobile-barber-booking.js?v=20260525ac"></script>
  <script src="/mobile-barber/mobile-barber-agent.js?v=20260525h"></script>
  <script src="/mobile-barber/mobile-barber-voice.js?v=20260525f"></script>
  <script src="/mobile-barber/mobile-barber.js?v=20260525ad"></script>
</body>
</html>
