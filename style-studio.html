<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a2344">
  <title>AI Style Studio · Du Lich Cali</title>
  <meta name="description" content="AI Master Stylist — upload a selfie and let AI create your best look. Try hairstyles, colors, eyebrows, beards, wigs, and event looks with AI.">
  <meta property="og:title" content="AI Style Studio · Du Lich Cali">
  <meta property="og:description" content="AI Master Stylist — upload a selfie and let AI design your best look.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;1,6..96,300;1,6..96,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css?v=20260419m">
  <link rel="stylesheet" href="/desktop.css">
  <link rel="stylesheet" href="/style-studio.css?v=20260614i">

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5S0P4XMCJR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5S0P4XMCJR');

</head>
<body>
<div class="ss-page">

  <header class="app-bar">
    <a href="/" class="app-bar__brand" style="text-decoration:none; color:var(--cream);">✦ Du Lich Cali</a>
    <a href="mailto:dulichcali21@gmail.com" class="app-bar__call">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
      </svg>
      Email
    </a>
  </header>

  <!-- 1. Top bar: account control + language switcher -->
  <div class="ss-topbar">
    <!-- Account: anonymous → "Log in / Sign up"; signed-in customer → profile chip + Logout -->
    <div class="ss-account" id="ssAccount"></div>

    <div class="ss-lang" id="ssLang" role="group" aria-label="Language">
      <button class="ss-lang__btn" type="button" data-lang="en">EN</button>
      <button class="ss-lang__btn" type="button" data-lang="vi">VI</button>
      <button class="ss-lang__btn" type="button" data-lang="es">ES</button>
    </div>
  </div>

  <!-- Inline collapsible login / signup panel (NOT a trapping modal). Built by JS. -->
  <div class="ss-auth" id="ssAuthPanel" hidden></div>

  <!-- Inline customer account panel (profile + Favorites + Saved looks). Built by JS. Local-only. -->
  <div class="ss-acct" id="ssAccountPanel" hidden></div>

  <!-- 2. HERO — AI Master Stylist (flagship) -->
  <section class="ss-hero">
    <div class="ss-hero__inner">
      <span class="ss-hero__chip"><span aria-hidden="true">✨</span> <span data-ss-i18n="heroChip"></span></span>
      <span class="ss-hero__tagline" data-ss-i18n="heroTagline"></span>
      <h1 class="ss-hero__title" data-ss-i18n="heroTitle"></h1>
      <p class="ss-hero__sub" data-ss-i18n="heroSub"></p>
      <p class="ss-hero__benefit" data-ss-i18n="heroBenefit"></p>

      <!-- SP-7: live animated demo — upload → analyzing → before → after (loops) -->
      <div class="ss-demo" id="ssHeroDemo" aria-hidden="true"></div>

      <div class="ss-flagship">
        <label class="ss-consent">
          <input type="checkbox" id="ssConsent">
          <span data-ss-i18n="consent"></span>
        </label>

        <div class="ss-field">
          <label class="ss-upload">
            <span class="ss-upload__btn" id="ssUploadBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg>
              <span data-ss-i18n="uploadCta"></span>
            </span>
            <input type="file" id="ssSelfieInput" accept="image/*">
          </label>
          <p class="ss-upload__tips" data-ss-i18n="selfieTips"></p>
        </div>

        <div class="ss-field">
          <span class="ss-field__label" data-ss-i18n="goalLabel"></span>
          <div class="ss-chips" id="ssGoalChips" role="group" aria-label="Style goal"></div>
        </div>

        <button class="ss-cta" id="ssGenerateBest" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3 9.5 9.5 3 12l6.5 2.5L12 21l2.5-6.5L21 12l-6.5-2.5Z"/></svg>
          <span data-ss-i18n="generateBest"></span>
        </button>

        <span class="ss-status" id="ssStatus"></span>

        <div class="ss-master-result" id="ssMasterResult"></div>
      </div>
    </div>
  </section>

  <!-- SP-7: Before → After showcase carousel -->
  <section class="ss-ba-wrap" id="ssBaWrap">
    <h2 class="ss-section-title" data-ss-i18n="baTitle"></h2>
    <p class="ss-section-sub" data-ss-i18n="baSub"></p>
    <div class="ss-ba-carousel" id="ssBaShowcase" role="list"></div>
  </section>

  <!-- SP-7: WOW — "What would you look like?" -->
  <section class="ss-wow" id="ssWowWrap">
    <h2 class="ss-section-title" data-ss-i18n="wowTitle"></h2>
    <p class="ss-section-sub" data-ss-i18n="wowSub"></p>
    <div class="ss-wow__grid" id="ssWow"></div>
    <button class="ss-cta ss-wow__cta" id="ssWowCta" type="button" data-ss-i18n="wowCta"></button>
  </section>

  <!-- SP-7: Success stories -->
  <section class="ss-stories-wrap" id="ssStoriesWrap">
    <h2 class="ss-section-title" data-ss-i18n="storiesTitle"></h2>
    <div class="ss-stories" id="ssStories" role="list"></div>
  </section>

  <!-- 3. AI Style Showcase — swipeable carousel -->
  <section class="ss-showcase-wrap" id="ssShowcaseWrap">
    <h2 class="ss-showcase__title" data-ss-i18n="showcaseTitle"></h2>
    <div class="ss-showcase" id="ssShowcase" role="list"></div>
  </section>

  <!-- 4. AI Wig Match — flagship -->
  <section class="ss-wigmatch" id="ssWigMatch">
    <div class="ss-wigmatch__inner">
      <span class="ss-wigmatch__chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a7 7 0 0 0-7 7v4a3 3 0 0 0 3 3h.5"/><path d="M12 3a7 7 0 0 1 7 7v4a3 3 0 0 1-3 3h-.5"/><path d="M9 20a3 3 0 0 0 6 0"/><circle cx="12" cy="11" r="2.2"/></svg>
        <span data-ss-i18n="wigChip"></span>
      </span>
      <h2 class="ss-wigmatch__title" data-ss-i18n="wigTitle"></h2>
      <p class="ss-wigmatch__sub" data-ss-i18n="wigSub"></p>
      <div class="ss-wigmatch__examples" id="ssWigExamples"></div>
      <ul class="ss-wigmatch__benefits" aria-label="Benefits">
        <li class="ss-wigmatch__benefit"><span class="ss-check" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span data-ss-i18n="wigBenefit1"></span></li>
        <li class="ss-wigmatch__benefit"><span class="ss-check" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span data-ss-i18n="wigBenefit2"></span></li>
        <li class="ss-wigmatch__benefit"><span class="ss-check" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span data-ss-i18n="wigBenefit3"></span></li>
        <li class="ss-wigmatch__benefit"><span class="ss-check" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span data-ss-i18n="wigBenefit4"></span></li>
      </ul>
      <button class="ss-cta ss-wigmatch__cta" id="ssWigGenerate" type="button" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3 9.5 9.5 3 12l6.5 2.5L12 21l2.5-6.5L21 12l-6.5-2.5Z"/></svg>
        <span data-ss-i18n="wigCta"></span>
      </button>
      <span class="ss-status" id="ssWigStatus"></span>
      <div class="ss-wig-result" id="ssWigResult"></div>
    </div>
  </section>

  <!-- 5. Launch banner -->
  <div class="ss-banner" id="ssLaunchBanner">
    <span class="ss-banner__icon" aria-hidden="true">🎁</span>
    <span data-ss-i18n="banner"></span>
  </div>

  <!-- 6. Studio Gallery — large Netflix-style mode cards -->
  <section class="ss-modes" id="ssModes">
    <div class="ss-modes__head">
      <h2 class="ss-modes__title" data-ss-i18n="galleryTitle"></h2>
      <p class="ss-modes__sub" data-ss-i18n="gallerySub"></p>
    </div>
    <div class="ss-audience-wrap">
      <span class="ss-audience-wrap__label" data-ss-i18n="audienceLabel"></span>
      <div class="ss-seg" id="ssAudienceSeg" role="group" aria-label="Audience"></div>
    </div>
    <div class="ss-gallery" id="ssGallery"></div>
  </section>

  <!-- 6b. Testimonials -->
  <section class="ss-testimonials" id="ssTestimonialsWrap">
    <h2 class="ss-testimonials__title" data-ss-i18n="testimonialsTitle"></h2>
    <div class="ss-testimonials__grid" id="ssTestimonials"></div>
  </section>

  <!-- 7. Membership / login wall (hidden until the free limit is reached) -->
  <section class="ss-membership" id="ssMembershipPrompt" hidden>
    <div class="ss-membership__icon" aria-hidden="true">✦</div>
    <h2 class="ss-membership__title" data-ss-i18n="membershipTitle"></h2>
    <p class="ss-membership__sub" data-ss-i18n="membershipPrompt"></p>
    <button class="ss-membership__cta" id="ssMembershipCta" type="button" data-ss-i18n="membershipCta"></button>
  </section>

  <!-- 8. Privacy note -->
  <p class="ss-privacy">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
    <span data-ss-i18n="privacyNote"></span>
  </p>

  <!-- 9. Back home -->
  <a href="/" class="ss-back" data-ss-i18n="backHome"></a>

</div>

<!-- SP-7: floating "Try AI Style Studio" CTA (shown after scrolling past the hero) -->
<button class="ss-sticky-cta" id="ssStickyCta" type="button"><span aria-hidden="true">✨</span> <span data-ss-i18n="stickyCta"></span></button>
