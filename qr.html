<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Codes · Du Lịch Cali</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&family=Bodoni+Moda:opsz,wght@6..96,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d2f50;
      --gold: #f5a623;
      --font: 'Jost', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: #f4f0ea;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header__logo {
      font-family: 'Bodoni Moda', Georgia, serif;
      font-size: 1.9rem;
      color: var(--navy);
      letter-spacing: .04em;
    }
    .page-header__sub {
      font-size: .9rem;
      color: #555;
      margin-top: .3rem;
    }
    .page-header__site {
      display: inline-block;
      margin-top: .4rem;
      font-size: .78rem;
      color: var(--navy);
      opacity: .55;
      font-family: monospace;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .qr-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.4rem 1.2rem;
      text-align: center;
      box-shadow: 0 2px 14px rgba(0,0,0,.09);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      page-break-inside: avoid;
    }
    .qr-card__icon { font-size: 2rem; line-height: 1; }
    .qr-card__title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--navy);
    }
    .qr-card__sub {
      font-size: .72rem;
      color: #666;
      line-height: 1.4;
    }

    /* The QR image itself */
    .qr-card__img {
      width: 180px;
      height: 180px;
      border: 3px solid var(--navy);
      border-radius: 10px;
      display: block;
      background: #fff;
    }

    .qr-card__url {
      font-size: .68rem;
      color: #888;
      word-break: break-all;
      font-family: monospace;
      line-height: 1.4;
    }

    .qr-card__actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .qr-btn {
      font-size: .72rem;
      padding: .3rem .75rem;
      border-radius: 20px;
      border: 1.5px solid var(--navy);
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      font-family: var(--font);
      transition: background .15s, color .15s;
      text-decoration: none;
      display: inline-block;
      line-height: 1.6;
    }
    .qr-btn:hover { background: var(--navy); color: #fff; }
    .qr-btn--dl { background: var(--navy); color: #fff; border-color: var(--navy); }
    .qr-btn--dl:hover { opacity: .85; }
    .qr-btn.copied { background: #22c55e; border-color: #22c55e; color: #fff; }

    .page-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 2.5rem auto 0;
      flex-wrap: wrap;
      max-width: 960px;
    }
    .btn {
      padding: .65rem 1.8rem;
      border-radius: 24px;
      font-size: .9rem;
      font-family: var(--font);
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn--primary   { background: var(--navy); color: #fff; }
    .btn--secondary { background: var(--gold); color: var(--navy); }

    .notice {
      text-align: center;
      font-size: .8rem;
      color: #888;
      margin-top: 1rem;
    }

    @media (max-width: 520px) {
      .qr-grid { grid-template-columns: 1fr 1fr; gap: .9rem; }
      .qr-card { padding: .9rem .7rem; }
      .qr-card__img { width: 130px; height: 130px; }
    }

    @media print {
      body { background: white; padding: .5rem; }
      .page-actions, .qr-btn, .notice { display: none !important; }
      .qr-grid { grid-template-columns: repeat(3, 1fr); gap: .75rem; max-width: 100%; }
      .qr-card { box-shadow: none; border: 1px solid #ccc; padding: .75rem; }
      .qr-card__img { width: 140px; height: 140px; }
      .page-header { margin-bottom: 1rem; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="page-header__logo">Du Lịch Cali</div>
  <div class="page-header__sub">QR Codes — Quảng cáo mạng xã hội &amp; tài liệu in</div>
  <div class="page-header__site">www.dulichcali21.com</div>
</div>

<div class="qr-grid" id="qrGrid"></div>

<div class="page-actions">
  <button class="btn btn--primary" onclick="window.print()">In tất cả QR Codes</button>
</div>
<p class="notice">Bấm "Tải PNG" để lưu từng QR · Bấm "In tất cả" để in toàn bộ trang</p>

<script>
  var BASE = 'https://www.dulichcali21.com';
  var QR_API = 'https://api.qrserver.com/v1/create-qr-code/';

  var SERVICES = [
    {
      id:    'food',
      icon:  '🥟',
      title: 'Đặt Món Ăn',
      sub:   'Chả giò · Phở Bắc · Chuối đậu nấu ốc',
      url:   BASE + '/food',
      color: 'dark: #0d2f50',
    },
    {
      id:    'nails',
      icon:  '💅',
      title: 'Nail Salon',
      sub:   'Manicure · Pedicure · Gel · Acrylic',
      url:   BASE + '/nails',
    },
    {
      id:    'hair',
      icon:  '💇',
      title: 'Salon Tóc',
      sub:   'Cắt · Nhuộm · Keratin · Uốn · Duỗi',
      url:   BASE + '/hair',
    },
    {
      id:    'airport',
      icon:  '✈️',
      title: 'Đưa Đón Sân Bay',
      sub:   'LAX · SNA · SFO · SJC · 24/7',
      url:   BASE + '/airport',
    },
    {
      id:    'tour',
      icon:  '🗺️',
      title: 'Tour Du Lịch',
      sub:   'Las Vegas · Yosemite · San Francisco',
      url:   BASE + '/tour',
    },
    {
      id:    'home',
      icon:  '🏠',
      title: 'Trang Chủ',
      sub:   'Du Lịch Cali — Tất cả dịch vụ',
      url:   BASE,
    },
  ];

  function qrSrc(url, size) {
    // api.qrserver.com: free, reliable, no API key needed
    return QR_API + '?size=' + size + 'x' + size +
           '&data=' + encodeURIComponent(url) +
           '&color=0d2f50&bgcolor=ffffff&qzone=1&format=png&ecc=M';
  }

  function buildCard(svc) {
    var card = document.createElement('div');
    card.className = 'qr-card';

    // Icon + title + sub
    var icon = document.createElement('div');
    icon.className = 'qr-card__icon';
    icon.textContent = svc.icon;

    var title = document.createElement('div');
    title.className = 'qr-card__title';
    title.textContent = svc.title;

    var sub = document.createElement('div');
    sub.className = 'qr-card__sub';
    sub.textContent = svc.sub;

    // QR image — loaded from api.qrserver.com
    var img = document.createElement('img');
    img.className = 'qr-card__img';
    img.src = qrSrc(svc.url, 300);  // request 300px for crispness, display at 180px
    img.alt = 'QR code cho ' + svc.title;
    img.loading = 'lazy';

    // URL display
    var urlDiv = document.createElement('div');
    urlDiv.className = 'qr-card__url';
    urlDiv.textContent = svc.url;

    // Action buttons
    var actions = document.createElement('div');
    actions.className = 'qr-card__actions';

    // Copy link button
    var copyBtn = document.createElement('button');
    copyBtn.className = 'qr-btn';
    copyBtn.textContent = 'Sao chép link';
    copyBtn.onclick = function() {
      navigator.clipboard.writeText(svc.url).then(function() {
        copyBtn.textContent = 'Đã sao chép!';
        copyBtn.classList.add('copied');
        setTimeout(function() {
          copyBtn.textContent = 'Sao chép link';
          copyBtn.classList.remove('copied');
        }, 2000);
      }).catch(function() {
        // Fallback for browsers without clipboard API
        var tmp = document.createElement('input');
        tmp.value = svc.url;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
        copyBtn.textContent = 'Đã sao chép!';
        copyBtn.classList.add('copied');
        setTimeout(function() {
          copyBtn.textContent = 'Sao chép link';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    };

    // Download PNG button — links directly to API with download filename
    var dlLink = document.createElement('a');
    dlLink.className = 'qr-btn qr-btn--dl';
    dlLink.textContent = 'Tải PNG';
    dlLink.href = qrSrc(svc.url, 400);  // 400px for download quality
    dlLink.download = 'qr-dulicali-' + svc.id + '.png';
    dlLink.target = '_blank';  // fallback if download attr doesn't work cross-origin

    actions.appendChild(copyBtn);
    actions.appendChild(dlLink);

    card.appendChild(icon);
    card.appendChild(title);
    card.appendChild(sub);
    card.appendChild(img);
    card.appendChild(urlDiv);
    card.appendChild(actions);

    return card;
  }

  var grid = document.getElementById('qrGrid');
  SERVICES.forEach(function(svc) {
    grid.appendChild(buildCard(svc));
  });
</script>
</body>
</html>
