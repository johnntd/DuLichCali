<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cảm Ơn — Du Lịch Cali</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;1,6..96,300;1,6..96,400&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy-900: #050b1a;
      --navy-800: #081228;
      --gold:     #c8922a;
      --gold-lt:  #e8b84b;
      --cream:    #f0e6d3;
      --text:     #a8becf;
      --muted:    #526878;
      --border:   rgba(255,255,255,0.07);
      --border-g: rgba(200,146,42,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'Jost', system-ui, sans-serif;
      background: var(--navy-900);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(200,146,42,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(8,18,40,0.8) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--navy-800);
      border: 1px solid var(--border-g);
      border-radius: 12px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 56px rgba(0,0,0,0.5);
    }

    .check-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--gold-dim, rgba(200,146,42,0.15));
      border: 1px solid var(--border-g);
      border-radius: 50%;
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
      color: var(--gold-lt);
    }

    h1 {
      font-family: 'Bodoni Moda', Georgia, serif;
      font-size: 2.6rem;
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.01em;
      margin-bottom: 0.8rem;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border-g);
      margin: 0 auto 1.75rem;
    }

    .contact-block {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 2;
      margin-bottom: 2rem;
    }

    .contact-block strong {
      color: var(--cream);
      font-weight: 500;
    }

    .contact-block a {
      color: var(--gold-lt);
      text-decoration: none;
    }

    .contact-block a:hover { color: var(--cream); }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      padding: 0 2rem;
      background: var(--gold);
      color: var(--navy-900);
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-home:hover {
      background: #e8b84b;
      box-shadow: 0 6px 20px rgba(200,146,42,0.35);
    }

    .brand-foot {
      margin-top: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    #trackingSection { display: none; margin-bottom: 0.5rem; }

    .booking-id-badge {
      display: inline-block;
      background: rgba(200,146,42,0.1);
      border: 1px solid var(--border-g);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.78rem;
      color: var(--gold-lt);
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .btn-track {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      padding: 0 2rem;
      width: 100%;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-lt);
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 0.75rem;
    }
    .btn-track:hover {
      background: var(--gold);
      color: var(--navy-900);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="check-icon">✓</div>

    <h1 id="title">Cảm Ơn Quý Khách!</h1>

    <p class="subtitle" id="message">
      Chúng tôi đã nhận được yêu cầu đặt dịch vụ của quý khách.<br>
      Nhân viên sẽ liên hệ trong thời gian sớm nhất để xác nhận.
    </p>

    <div id="trackingSection">
      <div class="booking-id-badge" id="bookingIdBadge"></div><br>
      <a id="trackBtn" href="#" class="btn-track"></a>
    </div>

    <div class="divider"></div>

    <div class="contact-block" id="contact">
      Mọi thắc mắc xin liên hệ:<br>
      <strong>Duy Hoa</strong> · <a href="tel:7142276007">714-227-6007</a><br>
      <strong>Dinh</strong> · <a href="tel:5623313809">562-331-3809</a><br>
      <a href="mailto:dulichcali21@gmail.com">dulichcali21@gmail.com</a>
    </div>

    <a href="index.html" class="btn-home" id="homeBtn">Trở Về Trang Chủ</a>

    <div class="brand-foot">✦ Du Lịch Cali</div>
  </div>

  <script>
    const t = {
      en: {
        title: 'Thank You!',
        message: 'We have received your service request.<br>Our staff will contact you shortly to confirm your booking.',
        contact: 'For questions, please contact:<br><strong>Duy Hoa</strong> · <a href="tel:7142276007">714-227-6007</a><br><strong>Dinh</strong> · <a href="tel:5623313809">562-331-3809</a><br><a href="mailto:dulichcali21@gmail.com">dulichcali21@gmail.com</a>',
        homeBtn: 'Return to Homepage'
      },
      vi: {
        title: 'Cảm Ơn Quý Khách!',
        message: 'Chúng tôi đã nhận được yêu cầu đặt dịch vụ của quý khách.<br>Nhân viên sẽ liên hệ trong thời gian sớm nhất để xác nhận.',
        contact: 'Mọi thắc mắc xin liên hệ:<br><strong>Duy Hoa</strong> · <a href="tel:7142276007">714-227-6007</a><br><strong>Dinh</strong> · <a href="tel:5623313809">562-331-3809</a><br><a href="mailto:dulichcali21@gmail.com">dulichcali21@gmail.com</a>',
        homeBtn: 'Trở Về Trang Chủ'
      }
    };

    const _params = new URLSearchParams(window.location.search);
    const lang = _params.get('lang') || 'vi';
    const l = t[lang] || t.vi;

    document.getElementById('title').textContent = l.title;
    document.getElementById('message').innerHTML  = l.message;
    document.getElementById('contact').innerHTML  = l.contact;
    document.getElementById('homeBtn').textContent = l.homeBtn;

    // Show booking ID + tracking link if present in URL
    const bookingId  = _params.get('id');
    const trackToken = _params.get('t');
    if (bookingId && trackToken) {
      document.getElementById('trackingSection').style.display = 'block';
      document.getElementById('bookingIdBadge').textContent =
        lang === 'en' ? `Booking: ${bookingId}` : `Mã đặt chỗ: ${bookingId}`;
      const trackBtn = document.getElementById('trackBtn');
      trackBtn.href  = `tracking.html?id=${encodeURIComponent(bookingId)}&t=${encodeURIComponent(trackToken)}&lang=${lang}`;
      trackBtn.textContent = lang === 'en' ? 'Track Your Ride' : 'Theo Dõi Chuyến Đi';
    }
  </script>
</body>
</html>
