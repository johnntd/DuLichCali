<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d2f50">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,300;6..96,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css?v=20260421b">
  <link rel="stylesheet" href="/desktop.css">
  <link rel="stylesheet" href="/mobile-barber/mobile-barber.css?v=20260530l">
</head>
<body class="mb-page mb-dashboard-page">
  <main class="mb-shell mb-dashboard-shell" id="mobileBarberDashboardApp" data-page="mobile-barber-dashboard">
    <div class="mb-language" id="mbDashboardLanguage" aria-label="">
      <button class="mb-language__button" type="button" data-lang="en">EN</button>
      <button class="mb-language__button" type="button" data-lang="vi">VI</button>
      <button class="mb-language__button" type="button" data-lang="es">ES</button>
    </div>

    <section class="mb-dashboard-hero" aria-labelledby="mbDashboardTitle">
      <div>
        <p class="mb-kicker" data-i18n="dashboardKicker"></p>
        <h1 id="mbDashboardTitle" data-i18n="dashboardTitle"></h1>
        <p id="mbDashboardSubtitle"></p>
      </div>
      <div class="mb-dashboard-hero__actions">
        <button class="mb-notif-bell" id="mbNotifBell" type="button" hidden>
          <span class="mb-ico" data-mb-ico="bell" aria-hidden="true"></span>
          <span class="mb-notif-badge" id="mbNotifBadge" hidden>0</span>
        </button>
        <a class="mb-button mb-button--ghost" id="mbPublicVendorLink" href=""></a>
      </div>
    </section>

    <section class="mb-dashboard-vendor-card" id="mbDashboardVendorCard" aria-label="Vendor"></section>

    <section class="mb-dashboard-panel mb-dashboard-alert-panel" aria-labelledby="mbNotificationTitle">
      <div class="mb-dashboard-panel__head">
        <h2 id="mbNotificationTitle" data-i18n="notificationTitle"></h2>
        <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="enableSoundAlerts" data-i18n="enableSoundAlerts"></button>
      </div>
      <div class="mb-notification-control-grid">
        <p><span data-i18n="soundAlertsLabel"></span> <strong id="mbSoundAlertState"></strong></p>
        <p><span data-i18n="notificationPermissionLabel"></span> <strong id="mbNotificationPermissionState"></strong></p>
        <p><span data-i18n="lastBookingAlertLabel"></span> <strong id="mbLastBookingAlert"></strong></p>
      </div>
      <button class="mb-button mb-button--ghost mb-button--sm" type="button" data-action="toggleSoundAlerts" id="mbToggleSoundAlerts"></button>
    </section>

    <section class="mb-dashboard-stats" role="tablist" aria-label="Appointment filters">
      <button class="mb-dashboard-stats__article mb-dashboard-stats__article--active" type="button" role="tab" aria-selected="true" data-summary-filter="today">
        <span data-i18n="statToday"></span>
        <strong id="mbStatToday">0</strong>
      </button>
      <button class="mb-dashboard-stats__article" type="button" role="tab" aria-selected="false" data-summary-filter="upcoming">
        <span data-i18n="statUpcoming"></span>
        <strong id="mbStatUpcoming">0</strong>
      </button>
      <button class="mb-dashboard-stats__article" type="button" role="tab" aria-selected="false" data-summary-filter="pending">
        <span data-i18n="statPending"></span>
        <strong id="mbStatPending">0</strong>
      </button>
      <button class="mb-dashboard-stats__article" type="button" role="tab" aria-selected="false" data-summary-filter="in_progress">
        <span data-i18n="statInProgress"></span>
        <strong id="mbStatInProgress">0</strong>
      </button>
      <button class="mb-dashboard-stats__article" type="button" role="tab" aria-selected="false" data-summary-filter="completed_today">
        <span data-i18n="statCompleted"></span>
        <strong id="mbStatCompleted">0</strong>
      </button>
    </section>

    <section class="mb-dashboard-panel mb-dashboard-appointments" data-owner-review-queue="appointments" aria-labelledby="mbAppointmentListTitle">
      <div class="mb-dashboard-panel__head">
        <h2 id="mbAppointmentListTitle" data-i18n="appointmentListTitle"></h2>
        <button class="mb-button mb-button--ghost mb-button--sm" type="button" data-action="refresh" data-i18n="refreshButton"></button>
      </div>
      <p class="mb-dashboard-appointments__hint" id="mbAppointmentListHint" data-i18n="appointmentListHint"></p>
      <div class="mb-dashboard-list mb-dashboard-list--wide" id="mbAppointmentList"></div>
    </section>

    <section class="mb-settings-section" id="mbSettingsSection" aria-labelledby="mbSettingsTitle">
      <header class="mb-settings-section__head">
        <h2 id="mbSettingsTitle" data-i18n="settingsTitle"></h2>
        <p class="mb-settings-section__hint" data-i18n="settingsHint"></p>
      </header>
      <div class="mb-settings-grid">

        <details class="mb-settings-panel" id="mbSettingsProfile">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsProfileTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsProfileSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbProfileTitle" data-i18n="profileTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="saveProfile" data-i18n="saveButton"></button>
            </div>
            <form class="mb-dashboard-form" id="mbProfileForm">
              <label class="mb-field"><span data-i18n="businessNameLabel"></span><input id="mbDashBusinessName" type="text"></label>
              <label class="mb-field"><span data-i18n="barberNameLabel"></span><input id="mbDashBarberName" type="text"></label>
              <label class="mb-field"><span data-i18n="phoneLabel"></span><input id="mbDashPhone" type="tel"></label>
              <label class="mb-field"><span data-i18n="emailLabel"></span><input id="mbDashEmail" type="email"></label>
              <label class="mb-field"><span data-i18n="serviceAreaLabel"></span><textarea id="mbDashServiceAreas" rows="3"></textarea></label>
              <label class="mb-field"><span data-i18n="travelRadiusLabel"></span><input id="mbDashTravelRadius" type="number" min="0" step="1"></label>
              <label class="mb-field"><span data-i18n="travelFeeLabel"></span><input id="mbDashTravelFee" type="number" min="0" step="1"></label>
            </form>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsServices">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsServicesTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsServicesSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbServicesManageTitle" data-i18n="servicesManageTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="saveService" data-i18n="saveServiceButton"></button>
            </div>
            <form class="mb-dashboard-form" id="mbServiceForm">
              <label class="mb-field"><span data-i18n="serviceSelectLabel"></span><select id="mbDashServiceSelect"></select></label>
              <label class="mb-field"><span data-i18n="serviceNameLabel"></span><input id="mbDashServiceName" type="text"></label>
              <label class="mb-field"><span data-i18n="servicePriceLabel"></span><input id="mbDashServicePrice" type="number" min="0" step="1"></label>
              <label class="mb-field"><span data-i18n="serviceDurationLabel"></span><input id="mbDashServiceDuration" type="number" min="1" step="5"></label>
              <label class="mb-field"><span data-i18n="cleanupBufferLabel"></span><input id="mbDashCleanupBuffer" type="number" min="0" step="5"></label>
              <label class="mb-field"><span data-i18n="travelBufferLabel"></span><input id="mbDashTravelBuffer" type="number" min="0" step="5"></label>
            </form>
            <div class="mb-dashboard-list" id="mbServicesManageList"></div>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsHours">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsHoursTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsHoursSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbHoursTitle" data-i18n="hoursTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="saveHours" data-i18n="saveHoursButton"></button>
            </div>
            <div class="mb-hours-grid" id="mbHoursGrid"></div>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsBlocks">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsBlocksTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsBlocksSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbBlocksTitle" data-i18n="blocksTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="addBlock" data-i18n="addBlockButton"></button>
            </div>
            <form class="mb-dashboard-form" id="mbBlockForm">
              <label class="mb-field"><span data-i18n="blockDateLabel"></span><input id="mbBlockDate" type="date"></label>
              <label class="mb-field"><span data-i18n="blockStartLabel"></span><input id="mbBlockStart" type="time"></label>
              <label class="mb-field"><span data-i18n="blockEndLabel"></span><input id="mbBlockEnd" type="time"></label>
              <label class="mb-field"><span data-i18n="blockReasonLabel"></span><input id="mbBlockReason" type="text"></label>
            </form>
            <div class="mb-dashboard-list" id="mbBlocksList"></div>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsPayments">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsPaymentsTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsPaymentsSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbPaymentsTitle" data-i18n="paymentsTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="savePayments" data-i18n="savePaymentsButton"></button>
            </div>
            <form class="mb-dashboard-form" id="mbPaymentsForm">
              <label class="mb-toggle-field"><input id="mbCashEnabled" type="checkbox"><span data-i18n="cashEnabledLabel"></span></label>
              <label class="mb-toggle-field"><input id="mbZelleEnabled" type="checkbox"><span data-i18n="zelleEnabledLabel"></span></label>
              <label class="mb-field"><span data-i18n="zellePhoneLabel"></span><input id="mbZellePhone" type="tel"></label>
              <label class="mb-field"><span data-i18n="zelleEmailLabel"></span><input id="mbZelleEmail" type="email"></label>
              <label class="mb-field"><span data-i18n="zelleQrLabel"></span><input id="mbZelleQrUpload" type="file" accept="image/*"></label>
            </form>
            <div class="mb-zelle-qr-preview" id="mbZelleQrPreview"></div>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsPortfolio">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsPortfolioTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsPortfolioSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbPortfolioManageTitle" data-i18n="portfolioTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="addPortfolio" data-i18n="addPortfolioButton"></button>
            </div>
            <form class="mb-dashboard-form" id="mbPortfolioForm">
              <label class="mb-field"><span data-i18n="portfolioTitleLabel"></span><input id="mbPortfolioTitleInput" type="text"></label>
              <label class="mb-field"><span data-i18n="portfolioDescriptionLabel"></span><textarea id="mbPortfolioDescription" rows="3"></textarea></label>
              <label class="mb-field"><span data-i18n="portfolioOrderLabel"></span><input id="mbPortfolioOrder" type="number" min="0" step="1"></label>
              <label class="mb-field"><span data-i18n="portfolioUploadLabel"></span><input id="mbPortfolioUpload" type="file" accept="image/*"></label>
              <label class="mb-field"><span data-i18n="beforeImageLabel"></span><input id="mbPortfolioBeforeUpload" type="file" accept="image/*"></label>
              <label class="mb-field"><span data-i18n="afterImageLabel"></span><input id="mbPortfolioAfterUpload" type="file" accept="image/*"></label>
            </form>
            <div class="mb-dashboard-list" id="mbPortfolioManageList"></div>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsPromotions">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsPromotionsTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsPromotionsSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbPromotionsTitle" data-i18n="promotionsTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="addPromotion" data-i18n="promotionsAddButton"></button>
            </div>
            <p class="mb-form-hint" data-i18n="promotionsHint"></p>
            <form class="mb-dashboard-form" id="mbPromotionForm">
              <label class="mb-field"><span data-i18n="promotionNameLabel"></span><input id="mbPromoName" type="text" maxlength="80"></label>
              <label class="mb-field"><span data-i18n="promotionDescriptionLabel"></span><textarea id="mbPromoDescription" rows="2" maxlength="200"></textarea></label>
              <label class="mb-field"><span data-i18n="promotionDiscountLabel"></span><input id="mbPromoDiscount" type="number" min="1" max="90" step="1"></label>
              <fieldset class="mb-radio-group">
                <legend class="mb-radio-group__legend" data-i18n="promotionScopeLabel"></legend>
                <label class="mb-radio-pill"><input type="radio" name="mbPromoScope" value="all" checked><span data-i18n="promotionScopeAll"></span></label>
                <label class="mb-radio-pill"><input type="radio" name="mbPromoScope" value="selected"><span data-i18n="promotionScopeSelected"></span></label>
              </fieldset>
              <label class="mb-field" id="mbPromoServicesField" hidden>
                <span data-i18n="promotionServicesLabel"></span>
                <select id="mbPromoServices" multiple size="4"></select>
              </label>
              <div class="mb-dashboard-form-row">
                <label class="mb-field"><span data-i18n="promotionStartLabel"></span><input id="mbPromoStart" type="date"></label>
                <label class="mb-field"><span data-i18n="promotionEndLabel"></span><input id="mbPromoEnd" type="date"></label>
              </div>
              <label class="mb-field"><span data-i18n="promotionMaxRedemptionsLabel"></span><input id="mbPromoMaxRedemptions" type="number" min="0" step="1" placeholder="0 = unlimited"></label>
              <label class="mb-field"><span data-i18n="promotionCodeLabel"></span><input id="mbPromoCode" type="text" maxlength="40" autocomplete="off"></label>
              <label class="mb-checkbox-field"><input id="mbPromoActive" type="checkbox" checked><span data-i18n="promotionActiveLabel"></span></label>
              <label class="mb-checkbox-field"><input id="mbPromoDisplayOnCustomerPage" type="checkbox" checked><span data-i18n="promotionDisplayOnCustomerLabel"></span></label>
              <p class="mb-field-warning" id="mbPromoFormError" hidden></p>
            </form>
            <div class="mb-dashboard-list" id="mbPromotionsManageList"></div>
          </div>
        </details>

        <details class="mb-settings-panel" id="mbSettingsReviews">
          <summary class="mb-settings-panel__summary">
            <span class="mb-settings-panel__title" data-i18n="settingsReviewsTitle"></span>
            <span class="mb-settings-panel__sub" data-i18n="settingsReviewsSub"></span>
            <span class="mb-settings-panel__chevron mb-ico" data-mb-ico="chevron-down" aria-hidden="true"></span>
          </summary>
          <div class="mb-settings-panel__body">
            <div class="mb-dashboard-panel__head">
              <h3 id="mbReviewsManageTitle" data-i18n="reviewsManageTitle"></h3>
              <button class="mb-button mb-button--primary mb-button--sm" type="button" data-action="saveReviewResponses" data-i18n="saveReviewResponsesButton"></button>
            </div>
            <div class="mb-dashboard-list" id="mbReviewsManageList"></div>
          </div>
        </details>

      </div>
    </section>

    <div class="mb-dashboard-toast" id="mbDashboardToast" hidden></div>
    <div class="mb-notif-drawer" id="mbNotifDrawer" hidden>
      <div class="mb-notif-drawer__backdrop" data-action="closeNotifDrawer"></div>
      <aside class="mb-notif-drawer__panel" aria-labelledby="mbNotifDrawerTitle">
        <header class="mb-notif-drawer__head">
          <h2 id="mbNotifDrawerTitle" data-i18n="notifDrawerTitle"></h2>
          <div class="mb-notif-drawer__actions">
            <button class="mb-button mb-button--ghost mb-button--sm" type="button" data-action="markAllNotificationsRead" data-i18n="notifMarkAllRead"></button>
            <button class="mb-icon-button mb-notif-drawer__close" type="button" data-action="closeNotifDrawer"></button>
          </div>
        </header>
        <div class="mb-notif-tabs" id="mbNotifTabs" role="tablist"></div>
        <div class="mb-notif-list" id="mbNotifList"></div>
      </aside>
    </div>
    <div class="mb-booking-alert-region" id="mbBookingAlertRegion" aria-live="polite"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

  <script src="/mobile-barber/mobile-barber-ai-preview.js?v=20260530a"></script>
  <script src="/mobile-barber/mobile-barber-dashboard.js?v=20260530f"></script>
</body>
</html>
