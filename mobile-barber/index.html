<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d2f50">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,300;6..96,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css?v=20260421b">
  <link rel="stylesheet" href="/desktop.css">
  <link rel="stylesheet" href="/mobile-barber/mobile-barber.css?v=20260528o">
</head>
<body class="mb-page">
  <main class="mb-shell" id="mobileBarberApp">
    <div class="mb-language" id="mbLanguage" aria-label="">
      <button class="mb-language__button" type="button" data-lang="en">EN</button>
      <button class="mb-language__button" type="button" data-lang="vi">VI</button>
      <button class="mb-language__button" type="button" data-lang="es">ES</button>
    </div>

    <section class="mb-hero" aria-labelledby="mbHeroTitle">
      <!-- Unified hero showcase. Populated by renderHeroMediaCarousel():
           • When an active vendor promotion exists, the promo slide LEADS
             the rotation (cinematic gold treatment + CTA inside the media).
           • Otherwise the default brand slide + 3 service clip slides
             rotate (Fade / Family / Hotel).
           One slide visible at a time with a 5s auto-rotate. -->
      <div class="mb-hero__media" id="mbHeroMedia" aria-live="polite" aria-label="Featured services"></div>
      <div class="mb-hero__body">
        <p class="mb-kicker" data-i18n="heroKicker"></p>
        <h1 class="mb-hero__title" id="mbHeroTitle" data-i18n="heroTitle"></h1>
        <p class="mb-hero__copy" data-i18n="heroCopy"></p>
        <div class="mb-hero__actions" aria-label="">
          <button class="mb-button mb-button--primary" type="button" data-action="chat" data-i18n="bookNow"></button>
          <button class="mb-button mb-button--ghost" type="button" data-action="chat" data-i18n="chatAssistant"></button>
          <button class="mb-icon-button" type="button" data-action="voice" aria-label="">
            <span class="mb-icon-button__icon" aria-hidden="true">☎</span>
            <span data-i18n="talkAssistant"></span>
          </button>
        </div>
        <ul class="mb-hero__trust-chips" aria-label="Trust signals">
          <li class="mb-trust-chip" data-i18n="trustChipLicensed"></li>
          <li class="mb-trust-chip" data-i18n="trustChipHouseCall"></li>
          <li class="mb-trust-chip" data-i18n="trustChipVerified"></li>
          <li class="mb-trust-chip" data-i18n="trustChipTravel"></li>
          <li class="mb-trust-chip" data-i18n="trustChipFamily"></li>
        </ul>
      </div>
    </section>

    <!-- Flagship "Latest AI Haircut Styles" carousel — moved up directly
         after the hero. AI hairstyle previews are the platform's most
         visually-impressive feature; surfacing them early drives conversion. -->
    <section class="mb-section mb-promo" aria-labelledby="mbPromoTitle">
      <div class="mb-promo__copy">
        <p class="mb-kicker" data-i18n="promoKicker"></p>
        <h2 id="mbPromoTitle" data-i18n="promoTitle"></h2>
        <p data-i18n="promoCopy"></p>
      </div>
      <div class="mb-promo__preview" id="mbPromoPreview" aria-live="polite"></div>
      <a class="mb-button mb-button--primary mb-promo__cta" href="#mbServices" data-i18n="promoCta"></a>
    </section>

    <section class="mb-section" id="mbServices" aria-labelledby="mbServicesTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="servicesKicker"></p>
        <h2 id="mbServicesTitle" data-i18n="servicesTitle"></h2>
      </div>
      <div class="mb-card-grid mb-service-selector" id="mbServiceList" aria-live="polite"></div>
      <div class="mb-service-progress" id="mbServiceProgress" aria-hidden="true"></div>
      <div class="mb-service-selection" id="mbServiceSelection" hidden></div>
    </section>

    <section class="mb-section mb-ai-preview-section" id="mbHomeAiPreview" aria-labelledby="mbHomeAiPreviewTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="homeAiPreviewKicker"></p>
        <h2 id="mbHomeAiPreviewTitle" data-i18n="homeAiPreviewTitle"></h2>
        <p data-i18n="homeAiPreviewIntro"></p>
      </div>
      <div class="mb-ai-preview" id="mbHomeAiPreviewBox">
        <div class="mb-ai-preview__body">
          <label class="mb-checkbox-field">
            <input id="mbHomeAiPreviewConsent" type="checkbox">
            <span data-i18n="homeAiPreviewConsent"></span>
          </label>
          <fieldset class="mb-field mb-ai-preview__source" id="mbHomeAiPreviewSourceFieldset" disabled>
            <legend><span data-i18n="homeAiPreviewUploadLabel"></span></legend>
            <label class="mb-ai-preview__source-button mb-ai-preview__source-button--primary mb-ai-preview__source-button--solo">
              <input id="mbHomeAiPreviewFile" type="file" accept="image/*" hidden>
              <span aria-hidden="true">📷</span>
              <span data-i18n="homeAiPreviewAddPhoto"></span>
            </label>
            <p class="mb-form-hint" data-i18n="homeAiPreviewAddPhotoHint"></p>
          </fieldset>
          <div class="mb-ai-preview__preview" id="mbHomeAiPreviewSelfie" hidden></div>
          <div class="mb-ai-preview__actions">
            <button class="mb-button mb-button--primary mb-button--sm" type="button" id="mbHomeAiPreviewAnalyze" data-i18n="homeAiPreviewAnalyze" disabled></button>
            <button class="mb-button mb-button--ghost mb-button--sm" type="button" id="mbHomeAiPreviewRemove" hidden data-i18n="homeAiPreviewRemove"></button>
          </div>
          <p class="mb-ai-preview__status" id="mbHomeAiPreviewStatus" aria-live="polite"></p>
          <p class="mb-form-hint mb-ai-preview__disclosure" data-i18n="homeAiPreviewDisclosure"></p>
          <div class="mb-ai-preview__results" id="mbHomeAiPreviewResults" hidden role="radiogroup" aria-label="AI haircut style recommendations"></div>
          <p class="mb-form-hint" id="mbHomeAiPreviewAttachNote" hidden data-i18n="homeAiPreviewAttachNote"></p>
        </div>
      </div>
    </section>

    <section class="mb-trust" aria-label="">
      <article>
        <span aria-hidden="true">⌂</span>
        <strong data-i18n="trustHomeTitle"></strong>
        <p data-i18n="trustHomeCopy"></p>
      </article>
      <article>
        <span aria-hidden="true">✓</span>
        <strong data-i18n="trustVerifiedTitle"></strong>
        <p data-i18n="trustVerifiedCopy"></p>
      </article>
      <article>
        <span aria-hidden="true">$</span>
        <strong data-i18n="trustPricingTitle"></strong>
        <p data-i18n="trustPricingCopy"></p>
      </article>
      <article>
        <span aria-hidden="true">↗</span>
        <strong data-i18n="trustConfirmTitle"></strong>
        <p data-i18n="trustConfirmCopy"></p>
      </article>
    </section>

    <!-- Supporting / educational content moved below booking sections -->
    <section class="mb-section mb-how-matching" aria-labelledby="mbHowMatchingTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="howMatchingKicker"></p>
        <h2 id="mbHowMatchingTitle" data-i18n="howMatchingTitle"></h2>
        <p data-i18n="howMatchingIntro"></p>
      </div>
      <ol class="mb-how-matching__steps">
        <li><span class="mb-how-matching__num">1</span><div><strong data-i18n="howMatchingStep1Title"></strong><span data-i18n="howMatchingStep1Body"></span></div></li>
        <li><span class="mb-how-matching__num">2</span><div><strong data-i18n="howMatchingStep2Title"></strong><span data-i18n="howMatchingStep2Body"></span></div></li>
        <li><span class="mb-how-matching__num">3</span><div><strong data-i18n="howMatchingStep3Title"></strong><span data-i18n="howMatchingStep3Body"></span></div></li>
        <li><span class="mb-how-matching__num">4</span><div><strong data-i18n="howMatchingStep4Title"></strong><span data-i18n="howMatchingStep4Body"></span></div></li>
        <li><span class="mb-how-matching__num">5</span><div><strong data-i18n="howMatchingStep5Title"></strong><span data-i18n="howMatchingStep5Body"></span></div></li>
      </ol>
    </section>

    <section class="mb-section mb-convenience" aria-labelledby="mbConvenienceTitle">
      <div class="mb-section__head">
        <p class="mb-kicker" data-i18n="convenienceKicker"></p>
        <h2 id="mbConvenienceTitle" data-i18n="convenienceTitle"></h2>
      </div>
      <div class="mb-convenience-grid" id="mbConvenienceList"></div>
    </section>


    <section class="mb-assistant mb-chat-panel" id="mbAssistantPanel" hidden aria-live="polite" aria-labelledby="mbAssistantPanelTitle">
      <header class="mb-chat-panel__head">
        <div>
          <p class="mb-kicker" data-i18n="assistantKicker"></p>
          <h2 id="mbAssistantPanelTitle" data-i18n="assistantTitle"></h2>
          <p class="mb-chat-panel__copy" data-i18n="assistantCopy"></p>
        </div>
        <button class="mb-button mb-button--ghost mb-button--sm" type="button" data-action="closeAssistant" data-i18n="assistantClose"></button>
      </header>
      <div class="mb-chat-panel__transcript" id="mbAssistantTranscript" role="log" aria-live="polite" aria-atomic="false"></div>
      <p class="mb-chat-panel__hint" id="mbAssistantNeedLocation" hidden data-i18n="assistantNeedLocation"></p>
      <div class="mb-chat-panel__preferred-barber" id="mbPreferredBarberWrap" hidden>
        <label for="mbPreferredBarberSelect" class="mb-chat-panel__preferred-label">
          <span data-i18n="preferredBarberLabel"></span>
          <select id="mbPreferredBarberSelect" class="mb-chat-panel__preferred-select"></select>
        </label>
        <p class="mb-chat-panel__preferred-hint" id="mbPreferredBarberHint" data-i18n="preferredBarberHint"></p>
      </div>
      <fieldset class="mb-payment-choice" id="mbPaymentChoice">
        <legend data-i18n="paymentChoiceLegend"></legend>
        <label><input type="radio" name="mbPaymentMethod" value="cash" checked> <span data-i18n="paymentCash"></span></label>
        <label><input type="radio" name="mbPaymentMethod" value="zelle"> <span data-i18n="paymentZelle"></span></label>
      </fieldset>
      <form class="mb-chat-panel__form" id="mbAssistantForm" novalidate>
        <label class="mb-chat-panel__input-wrap">
          <span class="mb-visually-hidden" data-i18n="assistantInputLabel"></span>
          <input id="mbAssistantInput" type="text" autocomplete="off" maxlength="500" required>
        </label>
        <button class="mb-button mb-button--primary mb-chat-panel__send" type="submit" data-i18n="assistantSend"></button>
      </form>
    </section>
  </main>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCo1FzDthSCXINRHlyJkqdcVKq_inM71SQ&libraries=places&loading=async"></script>

  <script src="/ai-engine.js?v=20260524a"></script>
  <script src="/nailsalon/phone-intake.js?v=20260427d"></script>
  <script src="/mobile-barber/mobile-barber-data.js?v=20260528p"></script>
  <script src="/mobile-barber/mobile-barber-booking.js?v=20260528o"></script>
  <script src="/mobile-barber/mobile-barber-agent.js?v=20260527p"></script>
  <script src="/mobile-barber/mobile-barber-voice.js?v=20260525f"></script>
  <script src="/mobile-barber/mobile-barber-ai-preview.js?v=20260527c"></script>
  <script src="/mobile-barber/mobile-barber.js?v=20260528o"></script>
</body>
</html>
