<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d2f50">
  <title>Salon Admin · Du Lịch Cali</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- Static salon data -->
  <script src="marketplace/services-data.js?v=20260405c"></script>

  <style>
    :root {
      --navy-900: #0d2f50;
      --navy-800: #123b62;
      --navy-700: #194a78;
      --gold:     #f5a623;
      --gold-lt:  #ffc857;
      --gold-dim: rgba(245,166,35,.14);
      --cream:    #fff8ee;
      --text:     #c8e4f8;
      --muted:    #6ab0d4;
      --border:   rgba(255,255,255,.12);
      --border-g: rgba(245,166,35,.35);
      --danger:   #f87171;
      --success:  #4ade80;
      --font-d: 'Bodoni Moda', Georgia, serif;
      --font-b: 'Jost', system-ui, sans-serif;
      --r: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font-b); background: var(--navy-900); color: var(--text); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

    /* ── Auth overlay ── */
    #authLoading {
      position: fixed; inset: 0; z-index: 300;
      background: var(--navy-900);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
    }
    .auth-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #authLoading.hidden { display: none; }

    /* ── App shell ── */
    #app { display: none; flex-direction: column; height: 100%; }
    #app.visible { display: flex; }

    /* ── Top bar ── */
    .va-bar {
      background: var(--navy-800);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      height: 52px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .va-bar__name { font-family: var(--font-d); font-size: 1rem; color: var(--cream); }
    .va-bar__label { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 1px; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-family: var(--font-b);
      font-size: .72rem; padding: .3rem .75rem; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-logout:hover { border-color: var(--text); color: var(--text); }

    /* ── Public page strip ── */
    .va-link-strip {
      background: var(--navy-800);
      border-bottom: 1px solid var(--border);
      padding: .45rem 1.25rem;
      display: flex; align-items: center; gap: .6rem; flex-shrink: 0;
    }
    .va-link-strip__label { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .va-link-strip__url { font-size: .72rem; color: var(--gold-lt); text-decoration: none; }
    .va-link-strip__url:hover { text-decoration: underline; }

    /* ── Body layout ── */
    .va-body { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .va-sidebar {
      width: 200px; flex-shrink: 0;
      background: var(--navy-800);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 1rem 0;
    }
    .va-nav-btn {
      display: block; width: 100%;
      background: transparent; border: none;
      padding: .65rem 1.25rem;
      text-align: left; cursor: pointer;
      font-family: var(--font-b); font-size: .78rem; font-weight: 600;
      color: var(--muted); letter-spacing: .04em; text-transform: uppercase;
      transition: background .15s, color .15s;
    }
    .va-nav-btn:hover { background: rgba(255,255,255,.05); color: var(--text); }
    .va-nav-btn.active { background: var(--gold-dim); color: var(--gold-lt); border-left: 3px solid var(--gold); }

    /* ── Main panel ── */
    .va-main { flex: 1; overflow-y: auto; padding: 1.5rem; }

    /* ── Section header ── */
    .sa-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: .5rem;
    }
    .sa-section-title {
      font-family: var(--font-d); font-size: 1.35rem; color: var(--cream);
    }

    /* ── Category tabs ── */
    .cat-tabs { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .cat-tab {
      background: transparent; border: 1px solid var(--border);
      border-radius: 20px; color: var(--muted);
      font-family: var(--font-b); font-size: .62rem; font-weight: 700;
      padding: .28rem .7rem; cursor: pointer; letter-spacing: .04em; text-transform: uppercase;
      transition: all .15s; white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--text); color: var(--text); }
    .cat-tab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-lt); }

    /* ── Cards ── */
    .sa-card {
      background: var(--navy-800);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1rem 1.25rem;
      margin-bottom: .75rem;
    }
    .sa-card--gold { border-color: var(--border-g); }

    /* ── Service/staff row ── */
    .sa-item {
      display: flex; align-items: flex-start; gap: .85rem;
      padding: .85rem 1rem;
      background: var(--navy-800);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: .6rem;
    }
    .sa-item.inactive-dim { opacity: .52; }
    .sa-item__img {
      width: 56px; height: 56px; flex-shrink: 0;
      border-radius: 6px; object-fit: cover;
      background: var(--navy-700);
    }
    .sa-item__img-ph {
      width: 56px; height: 56px; flex-shrink: 0;
      border-radius: 6px; background: var(--navy-700);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .sa-item__info { flex: 1; min-width: 0; }
    .sa-item__name { font-size: .88rem; font-weight: 600; color: var(--cream); display: flex; align-items: center; gap: .3rem; flex-wrap: wrap; }
    .sa-item__meta { font-size: .7rem; color: var(--muted); margin-top: .2rem; line-height: 1.4; }
    .sa-item__actions { display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; flex-shrink: 0; }

    /* ── Category badge ── */
    .cat-badge {
      display: inline-block; font-size: .53rem; font-weight: 700;
      padding: 1px 5px; border-radius: 3px;
      background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.22);
      color: var(--gold); text-transform: uppercase; letter-spacing: .04em;
    }

    /* ── Staff schedule pills ── */
    .sched-pills { display: flex; gap: .2rem; margin-top: .3rem; flex-wrap: wrap; }
    .sched-pill {
      font-size: .56rem; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; text-transform: uppercase; letter-spacing: .03em;
    }
    .sched-pill--on  { background: rgba(74,222,128,.1); color: var(--success); border: 1px solid rgba(74,222,128,.28); }
    .sched-pill--off { background: transparent; color: var(--muted); border: 1px solid var(--border); opacity: .55; }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font-b); cursor: pointer;
      border-radius: 6px; border: none;
      transition: opacity .2s, background .2s;
    }
    .btn--primary {
      background: var(--gold); color: #0a1e33;
      font-weight: 700; font-size: .78rem;
      padding: .5rem 1.1rem;
    }
    .btn--primary:hover { opacity: .88; }
    .btn--sm { font-size: .65rem; font-weight: 700; padding: .28rem .6rem; }
    .btn--outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn--outline:hover { border-color: var(--text); color: var(--text); }
    .btn--danger {
      background: transparent; border: 1px solid rgba(248,113,113,.3);
      color: #f87171;
    }
    .btn--success {
      background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.35);
      color: var(--success);
    }
    .toggle-pill {
      display: inline-flex; align-items: center; gap: .3rem;
      height: 24px; padding: 0 .55rem;
      border-radius: 999px; border: 1px solid var(--border);
      font-family: var(--font-b); font-size: .62rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase; cursor: pointer;
      background: transparent; transition: all .18s;
    }
    .toggle-pill.on  { background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.35); color: var(--success); }
    .toggle-pill.off { color: var(--muted); }

    /* ── Empty state ── */
    .sa-empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .85rem; }

    /* ── Hours grid ── */
    .hours-grid { display: flex; flex-direction: column; gap: .55rem; }
    .hours-row {
      display: flex; align-items: center; gap: .65rem;
      flex-wrap: wrap;
    }
    .hours-row__day { width: 72px; font-size: .78rem; font-weight: 600; color: var(--cream); }
    .hours-input {
      background: var(--navy-900); border: 1px solid var(--border);
      border-radius: 5px; color: var(--cream);
      font-family: var(--font-b); font-size: .78rem;
      padding: .3rem .5rem; width: 86px;
    }
    .hours-input:focus { outline: none; border-color: var(--gold); }
    .hours-input:disabled { opacity: .4; }
    .hours-row__closed { font-size: .72rem; color: var(--muted); display: flex; align-items: center; gap: .3rem; cursor: pointer; }

    /* ── Per-day schedule editor (staff modal) ── */
    .schedule-editor {
      border: 1px solid var(--border); border-radius: 6px;
      padding: .5rem .7rem; display: flex; flex-direction: column; gap: 0;
    }
    .sched-row {
      display: flex; align-items: center; gap: .5rem;
      padding: .32rem 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .sched-row:last-child { border-bottom: none; }
    .sched-day-lbl {
      width: 62px; font-size: .72rem; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: .3rem; cursor: pointer; flex-shrink: 0;
    }
    .sched-day-lbl input[type="checkbox"] { cursor: pointer; }
    .sched-sep { font-size: .7rem; color: var(--muted); }

    /* ── Staff assignment checkboxes (service modal) ── */
    .staff-checks { display: flex; flex-direction: column; gap: .38rem; padding: .4rem 0; }
    .staff-check { display: flex; align-items: center; gap: .45rem; font-size: .8rem; color: var(--text); cursor: pointer; }
    .staff-check input[type="checkbox"] { cursor: pointer; }

    /* ── Availability cards ── */
    .avail-grid { display: flex; flex-direction: column; gap: .6rem; }
    .avail-card {
      background: var(--navy-800); border: 1px solid var(--border);
      border-radius: var(--r); padding: .9rem 1.1rem;
    }
    .avail-card.avail-now { border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.04); }
    .avail-name { font-size: .9rem; font-weight: 600; color: var(--cream); display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .avail-hours { font-size: .72rem; color: var(--gold-lt); margin-top: .25rem; }
    .avail-specs { font-size: .68rem; color: var(--muted); margin-top: .12rem; }
    .avail-role  { font-size: .7rem; color: var(--muted); }
    .avail-badge {
      display: inline-block; font-size: .54rem; font-weight: 700;
      padding: 1px 6px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .avail-badge--now   { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.4); color: var(--success); }
    .avail-badge--today { background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.28); color: var(--gold); }
    .avail-badge--off   { background: transparent; border: 1px solid var(--border); color: var(--muted); }

    /* ── Form / modal ── */
    .sa-modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .sa-modal-backdrop.hidden { display: none; }
    .sa-modal {
      background: var(--navy-800);
      border: 1px solid var(--border-g);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      width: 100%; max-width: 460px;
      max-height: 90vh; overflow-y: auto;
    }
    .sa-modal h3 { font-family: var(--font-d); font-size: 1.1rem; color: var(--cream); margin-bottom: 1.1rem; }
    .sa-field { margin-bottom: .85rem; }
    .sa-field label { display: block; font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem; }
    .sa-input {
      width: 100%; background: var(--navy-900);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--cream); font-family: var(--font-b); font-size: .85rem;
      padding: .5rem .8rem;
    }
    .sa-input:focus { outline: none; border-color: var(--gold); }
    .sa-select {
      width: 100%; background: var(--navy-900);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--cream); font-family: var(--font-b); font-size: .85rem;
      padding: .5rem .8rem; cursor: pointer;
    }
    .sa-select:focus { outline: none; border-color: var(--gold); }
    .sa-modal-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1.25rem; }
    .sa-msg { font-size: .72rem; margin-top: .5rem; }
    .sa-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

    /* ── Appointment card ── */
    .appt-card {
      background: var(--navy-800); border: 1px solid var(--border);
      border-radius: var(--r); padding: .9rem 1.1rem; margin-bottom: .6rem;
    }
    .appt-card__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .3rem; }
    .appt-card__name { font-weight: 600; color: var(--cream); font-size: .88rem; }
    .appt-card__date { font-size: .72rem; color: var(--gold-lt); }
    .appt-card__meta { font-size: .72rem; color: var(--muted); }

    /* ── Booking calendar ── */
    .sa-date-group { margin-bottom: 1.25rem; }
    .sa-date-label {
      font-size: .65rem; font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: .08em;
      padding: .3rem 0; border-bottom: 1px solid var(--border-g);
      margin-bottom: .5rem;
    }
    .sa-appt-card {
      display: flex; gap: .75rem; align-items: flex-start;
      background: var(--navy-800); border: 1px solid var(--border);
      border-radius: var(--r); padding: .6rem .9rem; margin-bottom: .4rem;
    }
    .sa-appt-time {
      font-size: .78rem; font-weight: 700; color: var(--gold-lt);
      min-width: 4.5rem; flex-shrink: 0; padding-top: .05rem;
    }
    .sa-appt-body { flex: 1; min-width: 0; }
    .sa-appt-name { font-size: .83rem; font-weight: 600; color: var(--cream); }
    .sa-appt-svc  { font-size: .72rem; color: var(--muted); margin-top: .1rem; }
    .sa-appt-ph   { font-size: .68rem; color: var(--muted); opacity: .75; margin-top: .1rem; }

    /* ── Settings form ── */
    .settings-grid { display: flex; flex-direction: column; gap: .85rem; max-width: 480px; }

    /* ── Status badge ── */
    .status-badge {
      display: inline-block; font-size: .56rem; font-weight: 700;
      padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .status-badge--active { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); color: var(--success); }
    .status-badge--inactive { background: var(--navy-700); border: 1px solid var(--border); color: var(--muted); }

    /* ── Today heading ── */
    .today-heading {
      font-size: .72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .85rem;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--navy-700); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem 1.25rem;
      font-size: .8rem; color: var(--cream);
      opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── Mobile: bottom nav ── */
    @media (max-width: 767px) {
      .va-sidebar { display: none; }
      .va-body { flex-direction: column; }
      .va-main { padding: 1rem; }
      .mobile-tabs {
        display: flex; overflow-x: auto; gap: 0;
        background: var(--navy-800); border-bottom: 1px solid var(--border);
        flex-shrink: 0; -webkit-overflow-scrolling: touch;
      }
      .mobile-tab-btn {
        flex-shrink: 0; padding: .6rem .6rem;
        background: transparent; border: none; border-bottom: 2px solid transparent;
        font-family: var(--font-b); font-size: .6rem; font-weight: 600;
        color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
        cursor: pointer; white-space: nowrap;
      }
      .mobile-tab-btn.active { color: var(--gold-lt); border-bottom-color: var(--gold); }
      .sa-item__actions { justify-content: flex-end; }
    }
    @media (min-width: 768px) {
      .mobile-tabs { display: none; }
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<!-- Auth loading -->
<div id="authLoading">
  <div class="auth-spinner"></div>
  <div style="font-size:.78rem;color:var(--muted)">Đang xác thực…</div>
</div>

<!-- App -->
<div id="app">

  <!-- Top bar -->
  <div class="va-bar">
    <div>
      <div class="va-bar__name" id="barName">Salon Dashboard</div>
      <div class="va-bar__label" id="barId">…</div>
    </div>
    <button class="btn-logout" onclick="logout()">Đăng xuất</button>
  </div>

  <!-- Public page strip -->
  <div class="va-link-strip">
    <span class="va-link-strip__label">Public page:</span>
    <a class="va-link-strip__url" id="publicLink" href="#" target="_blank">/nailsalon/?id=…</a>
  </div>

  <!-- Mobile tabs -->
  <div class="mobile-tabs">
    <button class="mobile-tab-btn active" onclick="switchTab('services')">Dịch Vụ</button>
    <button class="mobile-tab-btn" onclick="switchTab('staff')">Nhân Viên</button>
    <button class="mobile-tab-btn" onclick="switchTab('availability')">Hôm Nay</button>
    <button class="mobile-tab-btn" onclick="switchTab('hours')">Giờ Mở</button>
    <button class="mobile-tab-btn" onclick="switchTab('appointments')">Lịch Hẹn <span id="escMobileBadge" style="display:none;background:#e8a800;color:#000;border-radius:99px;padding:1px 6px;font-size:.65rem;font-weight:700"></span></button>
    <button class="mobile-tab-btn" onclick="switchTab('settings')">Cài Đặt</button>
  </div>

  <!-- Body -->
  <div class="va-body">

    <!-- Sidebar nav -->
    <nav class="va-sidebar">
      <button class="va-nav-btn active" id="nav-services"      onclick="switchTab('services')">Dịch Vụ</button>
      <button class="va-nav-btn"        id="nav-staff"         onclick="switchTab('staff')">Nhân Viên</button>
      <button class="va-nav-btn"        id="nav-availability"  onclick="switchTab('availability')">Hôm Nay</button>
      <button class="va-nav-btn"        id="nav-hours"         onclick="switchTab('hours')">Giờ Mở Cửa</button>
      <button class="va-nav-btn"        id="nav-appointments"  onclick="switchTab('appointments')">Lịch Hẹn <span id="escNavBadge" style="display:none;background:#e8a800;color:#000;border-radius:99px;padding:1px 7px;font-size:.68rem;font-weight:700;margin-left:4px;vertical-align:middle"></span></button>
      <button class="va-nav-btn"        id="nav-settings"      onclick="switchTab('settings')">Cài Đặt</button>
    </nav>

    <!-- Main -->
    <main class="va-main">

      <!-- ── Services tab ── -->
      <div class="tab-panel active" id="panel-services">
        <div class="sa-section-header">
          <div class="sa-section-title">Dịch Vụ</div>
          <button class="btn btn--primary btn--sm" onclick="openServiceModal(null)">+ Thêm Dịch Vụ</button>
        </div>
        <div class="cat-tabs" id="catTabs">
          <button class="cat-tab active" data-cat="all" onclick="filterCat('all',this)">Tất cả</button>
        </div>
        <div id="servicesList"><div class="sa-empty">Đang tải…</div></div>
      </div>

      <!-- ── Staff tab ── -->
      <div class="tab-panel" id="panel-staff">
        <div class="sa-section-header">
          <div class="sa-section-title">Nhân Viên</div>
          <button class="btn btn--primary btn--sm" onclick="openStaffModal(null)">+ Thêm Nhân Viên</button>
        </div>

<div id="toast"></div>

<script>
  // ── Firebase config ──────────────────────────────────────────────────────────
  var firebaseConfig = {
    apiKey:            'AIzaSyCo1FzDthSCXINRHlyJkqdcVKq_inM71SQ',
    authDomain:        'dulichcali-booking-calendar.firebaseapp.com',
    projectId:         'dulichcali-booking-calendar',
    storageBucket:     'dulichcali-booking-calendar.appspot.com',
    messagingSenderId: '477366827450',
    appId:             '1:477366827450:web:90cd82bbc79019bb4d8c77'
  };
  var app  = firebase.initializeApp(firebaseConfig);
  var db   = firebase.firestore();
  var auth = firebase.auth();

  // ── Vendor category fallback map ─────────────────────────────────────────────
  var VENDOR_CATEGORY_MAP = {
    'nha-bep-cua-emily': 'food', 'pho-bac-bayarea': 'food', 'com-tam-oc': 'food',
    'luxurious-nails': 'nails',  'beauty-nails-oc': 'nails',
    'viet-hair-bayarea': 'hair', 'cali-hair-oc': 'hair'
  };

  // ── Day metadata ─────────────────────────────────────────────────────────────
  var DAYS = [
    { key:'mon', label:'Thứ 2', short:'T2' },
    { key:'tue', label:'Thứ 3', short:'T3' },
    { key:'wed', label:'Thứ 4', short:'T4' },
    { key:'thu', label:'Thứ 5', short:'T5' },
    { key:'fri', label:'Thứ 6', short:'T6' },
    { key:'sat', label:'Thứ 7', short:'T7' },
    { key:'sun', label:'CN',    short:'CN' }
  ];
  var DAY_JS_TO_KEY = ['sun','mon','tue','wed','thu','fri','sat'];

  var DEFAULT_HOURS = {
    mon:{open:'09:00',close:'19:00',closed:false}, tue:{open:'09:00',close:'19:00',closed:false},
    wed:{open:'09:00',close:'19:00',closed:false}, thu:{open:'09:00',close:'19:00',closed:false},
    fri:{open:'09:00',close:'19:00',closed:false}, sat:{open:'09:00',close:'18:00',closed:false},
    sun:{open:'10:00',close:'17:00',closed:false}
  };

  // ── State ────────────────────────────────────────────────────────────────────
  var VENDOR_ID      = null;
  var VENDOR_CAT     = null;
  var vendorRef      = null;
  var servicesRef    = null;
  var staffRef       = null;
  var unsubSvcs      = null;
  var unsubStaff     = null;
  var unsubAppts     = null;
  var unsubBookings  = null;
  var currentCatFilter   = 'all';
  var allServiceDocs     = [];   // [{id, data}] — full snapshot for filtering
  var currentStaffData   = [];   // [{id, name, data}] — for service modal checkboxes + availability
  var SERVICE_CATS       = [];   // [{key, label}] — loaded from static data
  var CATALOG_VERSION    = 2;    // Bump this to force a full catalog reset on next login
  var _catalogSeeding    = false;

  // ── Utility ─────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2800);
  }
  function timeToMins(t) {
    if (!t) return 0;
    var p = t.split(':');
    return parseInt(p[0]||0,10)*60 + parseInt(p[1]||0,10);
  }

  // ── Auth ─────────────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = 'vendor-login.html'; return; }

    db.collection('vendorUsers').doc(user.uid).get().then(function(doc) {
      if (!doc.exists) { auth.signOut().then(function(){ window.location.href = 'vendor-login.html'; }); return; }

      VENDOR_ID  = doc.data().vendorId;
      VENDOR_CAT = VENDOR_CATEGORY_MAP[VENDOR_ID] || 'nails';

      if (VENDOR_CAT === 'food') { window.location.href = 'vendor-admin.html'; return; }

      vendorRef   = db.collection('vendors').doc(VENDOR_ID);
      servicesRef = vendorRef.collection('services');
      staffRef    = vendorRef.collection('staff');

      var staticData = (window.MARKETPLACE && window.MARKETPLACE.getBusiness)
        ? window.MARKETPLACE.getBusiness(VENDOR_ID) : null;

      // Load service categories from static data
      SERVICE_CATS = (staticData && staticData.serviceCategories) || [];
      buildCatTabs();
      populateCategorySelect();

      vendorRef.get().then(function(vdoc) {
        var vdata   = vdoc.exists ? vdoc.data() : {};
        var bizName = vdata.businessName || (staticData && staticData.name) || VENDOR_ID;
        var catSlug = VENDOR_CAT === 'hair' ? 'hairsalon' : 'nailsalon';
        var pubUrl  = '/' + catSlug + '/?id=' + VENDOR_ID;

        document.getElementById('barName').textContent = bizName;
        document.getElementById('barId').textContent   = VENDOR_ID;
        var pl = document.getElementById('publicLink');
        pl.href = pubUrl; pl.textContent = pubUrl;

        document.getElementById('settingName').value    = vdata.businessName || (staticData && staticData.name)        || '';
        document.getElementById('settingPhone').value   = vdata.phoneDisplay  || (staticData && staticData.phoneDisplay) || '';
        document.getElementById('settingAddress').value = vdata.address       || (staticData && staticData.address)      || '';
        document.getElementById('settingDesc').value    = vdata.description   || (staticData && staticData.description)  || '';

        document.getElementById('authLoading').classList.add('hidden');
        document.getElementById('app').classList.add('visible');

        seedIfNeeded(staticData);
        subscribeServices();
        subscribeStaff();
        subscribeEscalations();
        subscribeBookings();
        loadHoursGrid(vdata.hoursSchedule);
      }).catch(function() {
        document.getElementById('authLoading').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        seedIfNeeded(staticData);
        subscribeServices();
        subscribeStaff();
        subscribeEscalations();
        loadHoursGrid(null);
      });
    }).catch(function() { window.location.href = 'vendor-login.html'; });
  });

  function logout() {
    if (unsubSvcs)      unsubSvcs();
    if (unsubStaff)     unsubStaff();
    if (unsubAppts)     unsubAppts();
    if (_unsubEsc)      _unsubEsc();
    if (unsubBookings)  unsubBookings();
    auth.signOut().then(function(){ window.location.href = 'vendor-login.html?id=' + (VENDOR_ID||''); });
  }

  // ── Seed from services-data.js on first load ─────────────────────────────────
  function seedIfNeeded(staticData) {
    if (!staticData) return;
    var ts = firebase.firestore.FieldValue.serverTimestamp;

    // Seed vendor doc if missing
    vendorRef.get().then(function(doc) {
      if (!doc.exists) {
        vendorRef.set({
          businessName: staticData.name || '',
          category:     staticData.category || VENDOR_CAT,
          phone:        staticData.phone || '',
          phoneDisplay: staticData.phoneDisplay || '',
          address:      staticData.address || '',
          description:  staticData.description || '',
          region:       staticData.region || '',
          city:         staticData.city || '',
          active:       true,
          createdAt:    ts(), updatedAt: ts()
        }).catch(function(){});
      }
    });

    // Seed/reset services based on catalogVersion — bump CATALOG_VERSION to force a full reset
    vendorRef.get().then(function(vdoc) {
      var vdata = vdoc.exists ? vdoc.data() : {};
      var currentVersion = vdata.catalogVersion || 0;
      if (currentVersion >= CATALOG_VERSION) return;
      if (_catalogSeeding) return;
      _catalogSeeding = true;
      _resetServiceCatalog(staticData, currentVersion);
    });

    // Seed staff subcollection if empty
    staffRef.limit(1).get().then(function(snap) {
      if (!snap.empty) return;
      var batch = db.batch();
      (staticData.staff || []).forEach(function(s, i) {
        var ref = staffRef.doc();
        // Support new per-day schedule format
        var sched = {};
        if (s.schedule && typeof s.schedule === 'object' && !Array.isArray(s.schedule)) {
          // New format: { mon: { active, start, end }, ... }
          sched = s.schedule;
        } else if (s.schedule && s.schedule.days) {
          // Old format: { days: ['Mon','Tue',...] }
          var dayNames = ['sun','mon','tue','wed','thu','fri','sat'];
          var oldDays = (s.schedule.days || []).map(function(d){ return d.toLowerCase().slice(0,3); });
          dayNames.forEach(function(dk) {
            sched[dk] = { active: oldDays.indexOf(dk) >= 0, start: '09:00', end: '18:00' };
          });
        }
        batch.set(ref, {
          name:          s.name || '',
          role:          s.role || '',
          specialties:   s.specialties || [],
          assignedServices: s.assignedServices || [],
          schedule:      sched,
          active:        s.active !== false,
          sortOrder:     i,
          createdAt:     ts(), updatedAt: ts()
        });
      });
      batch.commit().catch(function(){});
    });
  }

  // ── Catalog version reset ─────────────────────────────────────────────────────
  function _resetServiceCatalog(staticData, currentVersion) {
    var ts = firebase.firestore.FieldValue.serverTimestamp;
    var svcs = staticData.services || [];

    function _doBatchAdd() {
      var batch = db.batch();
      svcs.forEach(function(svc, i) {
        batch.set(servicesRef.doc(), {
          name:          svc.name || '',
          category:      svc.category || '',
          price:         svc.price || '',
          priceFrom:     svc.priceFrom || 0,
          duration:      svc.duration || '',
          durationMins:  svc.durationMins || 0,
          desc:          svc.desc || '',
          imageUrl:      svc.imageUrl || '',
          assignedStaff: svc.assignedStaff || [],
          active:        svc.active !== false,
          sortOrder:     i,
          createdAt:     ts(), updatedAt: ts()
        });
      });
      batch.commit()
        .then(function() { return vendorRef.update({ catalogVersion: CATALOG_VERSION }); })
        .then(function() {
          _catalogSeeding = false;
          showToast('✓ Catalog reset: ' + svcs.length + ' services loaded (all disabled by default).');
        })
        .catch(function(err) {
          _catalogSeeding = false;
          console.error('[DLC] catalog batch-add failed', err);
        });
    }

    if (currentVersion === 0) {
      // First-ever seed — no existing docs to delete
      _doBatchAdd();
      return;
    }

    // Upgrading: delete all existing services first, then re-add
    servicesRef.get().then(function(snap) {
      if (snap.empty) { _doBatchAdd(); return; }
      var delBatch = db.batch();
      snap.docs.forEach(function(d) { delBatch.delete(d.ref); });
      delBatch.commit().then(_doBatchAdd).catch(function(err) {
        _catalogSeeding = false;
        console.error('[DLC] catalog delete failed', err);
      });
    }).catch(function(err) {
      _catalogSeeding = false;
      console.error('[DLC] catalog fetch failed', err);
    });
  }

  // ── Category tabs ────────────────────────────────────────────────────────────
  function buildCatTabs() {
    var container = document.getElementById('catTabs');
    var extra = SERVICE_CATS.map(function(c) {
      return '<button class="cat-tab" data-cat="' + esc(c.key) + '" onclick="filterCat(\'' + esc(c.key) + '\',this)">' + esc(c.label) + '</button>';
    }).join('');
    container.innerHTML = '<button class="cat-tab active" data-cat="all" onclick="filterCat(\'all\',this)">Tất cả</button>' + extra;
  }

  function populateCategorySelect() {
    var sel = document.getElementById('svcCategory');
    var opts = SERVICE_CATS.map(function(c) {
      return '<option value="' + esc(c.key) + '">' + esc(c.label) + '</option>';
    }).join('');
    sel.innerHTML = '<option value="">— Chọn danh mục —</option>' + opts;
  }

  function filterCat(cat, btn) {
    currentCatFilter = cat;
    document.querySelectorAll('.cat-tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    reRenderServices();
  }

  // ── Services ─────────────────────────────────────────────────────────────────
  function subscribeServices() {
    if (unsubSvcs) unsubSvcs();
    unsubSvcs = servicesRef.orderBy('sortOrder').onSnapshot(function(snap) {
      allServiceDocs = snap.docs.map(function(d){ return { id: d.id, data: d.data() }; });
      reRenderServices();
    }, function() {
      unsubSvcs = servicesRef.onSnapshot(function(snap) {
        allServiceDocs = snap.docs.map(function(d){ return { id: d.id, data: d.data() }; });
        reRenderServices();
      });
    });
  }

  function catLabel(key) {
    for (var i = 0; i < SERVICE_CATS.length; i++) {
      if (SERVICE_CATS[i].key === key) return SERVICE_CATS[i].label;
    }
    return key;
  }

  function reRenderServices() {
    var el = document.getElementById('servicesList');
    var filtered = currentCatFilter === 'all'
      ? allServiceDocs
      : allServiceDocs.filter(function(d){ return d.data.category === currentCatFilter; });

    if (!filtered.length) {
      el.innerHTML = '<div class="sa-empty">' +
        (allServiceDocs.length ? 'Không có dịch vụ nào trong danh mục này.' : 'Chưa có dịch vụ nào. Nhấn "+ Thêm Dịch Vụ" để bắt đầu.') +
        '</div>';
      return;
    }

    el.innerHTML = filtered.map(function(item) {
      var s  = item.data;
      var id = item.id;
      var imgHtml = s.imageUrl
        ? '<img class="sa-item__img" src="' + esc(s.imageUrl) + '" alt="' + esc(s.name) + '" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="sa-item__img-ph">💅</div>';
      var staffMeta = (s.assignedStaff && s.assignedStaff.length)
        ? ' · ' + esc(s.assignedStaff.join(', ')) : '';
      var catHtml = s.category ? ' <span class="cat-badge">' + esc(catLabel(s.category)) + '</span>' : '';
      return '<div class="sa-item' + (s.active === false ? ' inactive-dim' : '') + '">' +
        imgHtml +
        '<div class="sa-item__info">' +
          '<div class="sa-item__name">' + esc(s.name) + catHtml +
            ' <span class="status-badge status-badge--' + (s.active !== false ? 'active' : 'inactive') + '">' +
            (s.active !== false ? 'Active' : 'Off') + '</span>' +
          '</div>' +
          '<div class="sa-item__meta">' +
            esc(s.price || '') +
            (s.duration ? ' · ' + esc(s.duration) : '') +
            staffMeta +
          '</div>' +
          (s.desc ? '<div class="sa-item__meta" style="margin-top:.1rem;font-size:.67rem;opacity:.8">' + esc(s.desc.slice(0,80)) + (s.desc.length>80?'…':'') + '</div>' : '') +
        '</div>' +
        '<div class="sa-item__actions">' +
          '<button class="toggle-pill ' + (s.active !== false ? 'on' : 'off') + '" ' +
            'onclick="toggleService(\'' + id + '\',' + (s.active === false) + ')">' +
            (s.active !== false ? '● On' : '○ Off') + '</button>' +
          '<button class="btn btn--outline btn--sm" onclick="openServiceModal(\'' + id + '\')">Edit</button>' +
          '<button class="btn btn--danger btn--sm" onclick="deleteService(\'' + id + '\')">Xóa</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function toggleService(id, newActive) {
    servicesRef.doc(id).update({ active: newActive, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }
  function deleteService(id) {
    if (!confirm('Xóa dịch vụ này?')) return;
    servicesRef.doc(id).delete().then(function(){ showToast('Đã xóa dịch vụ.'); });
  }

  function openServiceModal(id) {
    document.getElementById('serviceModal').classList.remove('hidden');
    document.getElementById('svcMsg').textContent = '';

    // Build staff checkboxes from current snapshot
    var staffHtml = currentStaffData.length
      ? currentStaffData.map(function(s) {
          return '<label class="staff-check"><input type="checkbox" value="' + esc(s.name) + '"> ' + esc(s.name) + '</label>';
        }).join('')
      : '<span style="color:var(--muted);font-size:.72rem">Chưa có nhân viên</span>';
    document.getElementById('svcStaffChecks').innerHTML = staffHtml;

    if (!id) {
      document.getElementById('serviceModalTitle').textContent = 'Thêm Dịch Vụ';
      document.getElementById('serviceDocId').value = '';
      ['svcName','svcPrice','svcDuration','svcDesc','svcImageUrl'].forEach(function(f){ document.getElementById(f).value = ''; });
      document.getElementById('svcCategory').value = '';
      return;
    }

    servicesRef.doc(id).get().then(function(doc) {
      if (!doc.exists) return;
      var d = doc.data();
      document.getElementById('serviceModalTitle').textContent = 'Chỉnh Sửa Dịch Vụ';
      document.getElementById('serviceDocId').value   = id;
      document.getElementById('svcName').value        = d.name     || '';
      document.getElementById('svcCategory').value    = d.category || '';
      document.getElementById('svcPrice').value       = d.price    || '';
      document.getElementById('svcDuration').value    = d.duration || '';
      document.getElementById('svcDesc').value        = d.desc     || '';
      document.getElementById('svcImageUrl').value    = d.imageUrl || '';
      // Check assigned staff boxes
      var assigned = d.assignedStaff || [];
      document.querySelectorAll('#svcStaffChecks input[type="checkbox"]').forEach(function(cb) {
        cb.checked = assigned.indexOf(cb.value) >= 0;
      });
    });
  }
  function closeServiceModal() { document.getElementById('serviceModal').classList.add('hidden'); }

  function openStaffModal(id) {

  function saveStaff() {
    var name = document.getElementById('staffName').value.trim();
    if (!name) { document.getElementById('staffMsg').textContent = 'Vui lòng nhập tên nhân viên.'; return; }
    var sched = {};

      sched[day.key] = {

      role:        document.getElementById('staffRole').value.trim(),

      schedule:    sched,
      updatedAt:   firebase.firestore.FieldValue.serverTimestamp()

      ? staffRef.doc(docId).update(data)

        .catch(function(e){ document.getElementById('staffMsg').textContent = 'Lỗi: ' + e.message; });

  // ── Availability ─────────────────────────────────────────────────────────────
  function renderAvailability() {
    var el   = document.getElementById('availList');
    var head = document.getElementById('todayHeading');

    var dayKeys  = ['sun','mon','tue','wed','thu','fri','sat'];
    var dayLabels= ['Chủ Nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
    var now      = new Date();
    var todayKey = dayKeys[now.getDay()];
    var todayLbl = dayLabels[now.getDay()];
    var nowMins  = now.getHours() * 60 + now.getMinutes();
    var timeStr  = now.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});

    head.textContent = todayLbl + ' — ' + timeStr;

    if (!currentStaffData.length) {
      el.innerHTML = '<div class="sa-empty">Đang tải dữ liệu nhân viên…</div>';
      return;
    }

    var html = '';
    currentStaffData.forEach(function(item) {
      var s   = item.data;
      if (!s.active) return;
      var ds  = s.schedule && s.schedule[todayKey];
      var working    = ds && ds.active;
      var nowWorking = false;
      if (working && ds.start && ds.end) {
        var startM = timeToMins(ds.start);
        var endM   = timeToMins(ds.end);
        nowWorking = nowMins >= startM && nowMins < endM;
      }
      var badge = nowWorking
        ? '<span class="avail-badge avail-badge--now">Đang làm</span>'
        : working
          ? '<span class="avail-badge avail-badge--today">Hôm nay</span>'
          : '<span class="avail-badge avail-badge--off">Nghỉ</span>';
      html += '<div class="avail-card' + (nowWorking ? ' avail-now' : '') + '">' +
        '<div class="avail-name">' + esc(s.name) + badge + '</div>' +
        (s.role ? '<div class="avail-role">' + esc(s.role) + '</div>' : '') +
        (working ? '<div class="avail-hours">' + esc(ds.start) + ' – ' + esc(ds.end) + '</div>' : '') +
        (s.specialties && s.specialties.length
          ? '<div class="avail-specs">' + esc(s.specialties.slice(0,4).join(', ')) + '</div>' : '') +
      '</div>';
    });

    el.innerHTML = html || '<div class="sa-empty">Không có nhân viên hoạt động nào được tìm thấy.</div>';
  }

  // ── AI Escalations (booking requests from Lily receptionist) ─────────────────
  var _unsubEsc = null;

  function subscribeEscalations() {
    if (_unsubEsc || !VENDOR_ID) return;
    var ref = db.collection('escalations')
      .where('vendorId', '==', VENDOR_ID)
      .limit(50);
    _unsubEsc = ref.onSnapshot(function (snap) {
      var items = [];
      snap.forEach(function (d) {
        var data = d.data();
        if (data.status === 'pending_vendor_response') {
          items.push(Object.assign({ id: d.id }, data));
        }
      });
      items.sort(function (a, b) {
        var ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
        var tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
        return tb - ta;
      });
      renderEscalations(items);
    }, function (err) {
      console.warn('[esc] listener error:', err.message);
    });
  }

  function renderEscalations(items) {
    var section = document.getElementById('escSection');
    var list    = document.getElementById('escList');
    var badge   = document.getElementById('escBadge');
    var navBadge = document.getElementById('escNavBadge');
    var mobBadge = document.getElementById('escMobileBadge');
    if (!section || !list) return;

    var count = items.length;
    [navBadge, mobBadge].forEach(function (b) {
      if (!b) return;
      b.textContent  = count;
      b.style.display = count > 0 ? 'inline-block' : 'none';
    });

    if (count === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    badge.textContent     = count;
    badge.style.display   = 'inline-block';

    var typeLabels = { appointment: '&#128197; Đặt Lịch', order: '&#128722; Đơn hàng', reservation: '&#128203; Đặt chỗ', question: '&#128172; Câu hỏi' };
    list.innerHTML = items.map(function (item) {
      var timeStr = '';
      if (item.createdAt && item.createdAt.toDate) {
        var d = item.createdAt.toDate();
        timeStr = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
      }
      var typeLabel  = typeLabels[item.escalationType] || '&#128172; Yêu cầu';
      var escId      = item.id;
      var replyId    = 'esc_r_' + escId;
      var summaryHtml = item.summary
        ? '<div style="font-size:.78rem;color:var(--muted);margin:.3rem 0 .6rem;white-space:pre-line;line-height:1.45">' + esc(item.summary) + '</div>'
        : '';
      return '<div class="appt-card" style="border-left:3px solid #e8a800;margin-bottom:.75rem">' +
        '<div class="appt-card__header">' +
          '<span class="appt-card__name">' + typeLabel + '</span>' +
          '<span class="appt-card__date">' + timeStr + '</span>' +
        '</div>' +
        summaryHtml +
        '<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem">' +
          '<button class="btn btn--primary btn--sm" onclick="respondEscalation(\'' + escId + '\',\'vendor_confirmed\',null)">&#10003; Xác nhận</button>' +
          '<button class="btn btn--sm" style="background:transparent;border:1px solid var(--danger);color:var(--danger)" onclick="respondEscalation(\'' + escId + '\',\'vendor_declined\',null)">&#10007; Từ chối</button>' +
        '</div>' +
        '<div style="display:flex;gap:.4rem;margin-top:.4rem">' +
          '<input id="' + replyId + '" type="text" class="sa-input" placeholder="Nhắn lại cho khách…" style="flex:1;height:36px;padding:0 10px">' +
          '<button class="btn btn--sm" style="background:var(--gold);color:#000;font-weight:600" onclick="respondEscalation(\'' + escId + '\',\'vendor_replied\',document.getElementById(\'' + replyId + '\').value)">Gửi</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function respondEscalation(escId, status, message) {
    var update = { status: status };
    if (message && message.trim()) update.vendorMessage = message.trim();

    if (status === 'vendor_confirmed') {
      // Read escalation first to get appointmentData, then write booking record + update status
      db.collection('escalations').doc(escId).get().then(function (doc) {
        var escData = doc.exists ? doc.data() : {};
        var appt = escData.appointmentData || {};
        var ts   = firebase.firestore.FieldValue.serverTimestamp;

        // Normalize services — support both new "services" array and old "service" string
        var svcs = appt.services || (appt.service ? [appt.service] : []);

        var apptRef = vendorRef.collection('appointments').doc();
        apptRef.set({
          escId:            escId,
          selectedServices: svcs,
          service:          svcs.join(', '),   // legacy compat for renderBookings
          staff:            appt.staff    || 'Any',
          date:             appt.date     || '',
          time:             appt.time     || '',
          customerName:     appt.name     || 'Khách',
          customerPhone:    appt.phone    || '',
          lang:             appt.lang || escData.lang || 'en',
          status:           'confirmed',
          confirmedAt:      ts(),
          createdAt:        ts()
        }).catch(function (e) { console.warn('[appt] write failed:', e.message); });

        return db.collection('escalations').doc(escId).update(update);
      }).then(function () {
        showToast('✓ Đã xác nhận! Lịch hẹn đã được lưu.');
      }).catch(function (err) { showToast('Lỗi: ' + err.message); });
    } else {
      db.collection('escalations').doc(escId).update(update)
        .then(function () {
          var labels = { vendor_declined: 'Đã từ chối.', vendor_replied: '✓ Đã gửi phản hồi!' };
          showToast(labels[status] || 'Đã cập nhật.');
        })
        .catch(function (err) { showToast('Lỗi: ' + err.message); });
    }
  }

  // ── Confirmed Appointment Calendar ───────────────────────────────────────────
  function subscribeBookings() {
    if (!VENDOR_ID || !vendorRef) return;
    if (unsubBookings) unsubBookings();

    function _startListener(query) {
      return query.onSnapshot(function (snap) {
        var items = snap.docs.map(function (d) {
          return Object.assign({ id: d.id }, d.data());
        });
        // Sort by date+time ascending (upcoming first), then past
        items.sort(function (a, b) {
          var da = (a.date || '') + 'T' + (a.time || '00:00');
          var db2 = (b.date || '') + 'T' + (b.time || '00:00');
          return da < db2 ? -1 : da > db2 ? 1 : 0;
        });
        renderBookings(items);
      }, function (err) {
        console.warn('[bookings] listener error:', err.message);
      });
    }

    // Try with orderBy first; Firestore auto-creates index for simple subcollection queries
    unsubBookings = _startListener(
      vendorRef.collection('appointments').limit(300)
    );
  }

  function _fmtDate(dateStr) {
    if (!dateStr) return 'Không xác định';
    try {
      var p = dateStr.split('-');
      var d = new Date(+p[0], +p[1] - 1, +p[2]);
      var today = new Date(); today.setHours(0,0,0,0);
      var diff  = Math.round((d - today) / 86400000);
      var base  = d.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'numeric', year: 'numeric' });
      if (diff === 0) return 'HÔM NAY — ' + base;
      if (diff === 1) return 'NGÀY MAI — ' + base;
      if (diff < 0)   return 'Đã qua — ' + base;
      return base;
    } catch (e) { return dateStr; }
  }

  function _fmtTime(timeStr) {
    if (!timeStr) return '';
    try {
      var p = timeStr.split(':');
      var h = +p[0], m = p[1] || '00';
      return (h % 12 || 12) + ':' + m + ' ' + (h >= 12 ? 'PM' : 'AM');
    } catch (e) { return timeStr; }
  }

  function renderBookings(items) {
    var el = document.getElementById('bookingsList');
    if (!el) return;
    if (!items.length) {
      el.innerHTML = '<div class="sa-empty">Chưa có lịch hẹn nào.</div>';
      return;
    }

    // Group by date
    var byDate = {};
    var dateOrder = [];
    items.forEach(function (b) {
      var d = b.date || 'unknown';
      if (!byDate[d]) { byDate[d] = []; dateOrder.push(d); }
      byDate[d].push(b);
    });

    var statusLabels = {
      confirmed: '<span style="font-size:.72rem;color:var(--success);white-space:nowrap">&#9679; Đã xác nhận</span>',
      completed: '<span style="font-size:.72rem;color:#60a5fa;white-space:nowrap">&#9679; Hoàn thành</span>',
      canceled:  '<span style="font-size:.72rem;color:var(--muted);white-space:nowrap">&#9679; Đã hủy</span>',
      no_show:   '<span style="font-size:.72rem;color:var(--danger);white-space:nowrap">&#9679; Vắng mặt</span>'
    };

    el.innerHTML = dateOrder.map(function (date) {
      var appts = byDate[date].map(function (b) {
        // Normalize service display — support both selectedServices array and service string
        var svcArr = b.selectedServices || b.services || (b.service ? [b.service] : []);
        var svcLabel = Array.isArray(svcArr) ? svcArr.join(', ') : (svcArr || '');
        var staffLabel = b.staff && b.staff !== 'Any' ? ' &middot; <span style="color:var(--gold-lt)">' + esc(b.staff) + '</span>' : '';
        var statusBadge = statusLabels[b.status] || '';

        var actions = '';
        if (b.status === 'confirmed') {
          actions = '<div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem">' +
            '<button class="btn btn--sm" style="background:var(--success);color:#000;font-size:.7rem;padding:3px 8px" onclick="updateBookingStatus(\'' + b.id + '\',\'completed\')">&#10003; Hoàn thành</button>' +
            '<button class="btn btn--sm" style="background:transparent;border:1px solid var(--danger);color:var(--danger);font-size:.7rem;padding:3px 8px" onclick="updateBookingStatus(\'' + b.id + '\',\'no_show\')">Vắng mặt</button>' +
            '<button class="btn btn--sm" style="background:transparent;border:1px solid var(--muted);color:var(--muted);font-size:.7rem;padding:3px 8px" onclick="updateBookingStatus(\'' + b.id + '\',\'canceled\')">Hủy</button>' +
          '</div>';
        }

        return '<div class="sa-appt-card">' +
          '<div class="sa-appt-time">' + esc(_fmtTime(b.time)) + '</div>' +
          '<div class="sa-appt-body">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">' +
              '<div class="sa-appt-name">' + esc(b.customerName || 'Khách') + '</div>' +
              statusBadge +
            '</div>' +
            '<div class="sa-appt-svc">' + esc(svcLabel) + staffLabel + '</div>' +
            (b.customerPhone ? '<div class="sa-appt-ph">' + esc(b.customerPhone) + '</div>' : '') +
            actions +
          '</div>' +
        '</div>';
      }).join('');

      return '<div class="sa-date-group">' +
        '<div class="sa-date-label">' + esc(_fmtDate(date)) + '</div>' +
        appts +
      '</div>';
    }).join('');
  }

  function updateBookingStatus(apptId, newStatus) {
    vendorRef.collection('appointments').doc(apptId).update({
      status:    newStatus,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function () {
      var labels = { completed: 'Đã hoàn thành!', no_show: 'Đã đánh dấu vắng mặt.', canceled: 'Đã hủy lịch.' };
      showToast(labels[newStatus] || 'Đã cập nhật.');
    }).catch(function (err) { showToast('Lỗi: ' + err.message); });
  }

  // ── Settings ──────────────────────────────────────────────────────────────────
  function saveSettings() {
    var data = {
      businessName: document.getElementById('settingName').value.trim(),
      phoneDisplay: document.getElementById('settingPhone').value.trim(),
      address:      document.getElementById('settingAddress').value.trim(),
      description:  document.getElementById('settingDesc').value.trim(),
      updatedAt:    firebase.firestore.FieldValue.serverTimestamp()
    };
    vendorRef.set(data, { merge: true })
      .then(function() {
        document.getElementById('barName').textContent = data.businessName || VENDOR_ID;
        var msg = document.getElementById('settingsMsg');
        msg.style.color = 'var(--success)'; msg.textContent = ' ✓ Đã lưu.';
        setTimeout(function(){ msg.textContent=''; }, 3000);
      })
      .catch(function(e) {
        var msg = document.getElementById('settingsMsg');
        msg.style.color = 'var(--danger)'; msg.textContent = ' Lỗi: ' + e.message;
      });
  }
</script>
</body>
</html>
